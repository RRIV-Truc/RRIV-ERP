<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_title }} — RRIV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app-layout.css') }}">
    <style>
        .app-shell { min-height: 100vh; background: #0f172a; color: #fff; }
        .app-shell-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,.1);
            background: linear-gradient(135deg, #008037, #006629);
        }
        .app-shell-body { max-width: 1100px; margin: 0 auto; padding: 32px 20px; }
        .app-placeholder {
            background: rgba(255,255,255,.05); border: 1px dashed rgba(255,255,255,.2);
            border-radius: 16px; padding: 40px 24px; text-align: center;
        }
        .back-link { color: #fff; text-decoration: none; font-weight: 600; }
        .back-link:hover { color: #b8f5c8; }
    </style>
</head>
<body class="app-shell">
    <header class="app-shell-header">
        <h1 style="font-size:1.2rem;margin:0;">{{ app_title }}</h1>
        <span id="appUserLabel" style="opacity:.85;font-size:.9rem;"></span>
    </header>

    <main class="app-shell-body">
        <div class="app-placeholder">
            <div style="font-size:3rem;margin-bottom:12px;">🚧</div>
            <h2>Module đang được chuyển từ Phước Hòa</h2>
            <p class="text-muted mt-2">
                Cấu trúc Supabase và lớp dịch vụ đã sẵn sàng.<br>
                Bước tiếp theo: copy file <code>{{ phuoc_hoa_file }}</code> từ dự án Phước Hòa vào đây.
            </p>
            <p class="mt-3"><small>App ID: <strong>{{ app_id }}</strong></small></p>
        </div>
    </main>

    {% include 'includes/rriv_core.html' %}
    <script>
        const APP_ID = '{{ app_id }}';
        (function init() {
            const user = Auth.restoreSession();
            if (!user) {
                alert('Vui lòng đăng nhập trước!');
                window.location.href = '/';
                return;
            }
            if (!Permissions.canAccessApp(APP_ID, user)) {
                alert('Bạn không có quyền truy cập ứng dụng này.');
                window.location.href = '/';
                return;
            }
            document.getElementById('appUserLabel').textContent = user.name || user.username;
        })();
    </script>
</body>
</html>
