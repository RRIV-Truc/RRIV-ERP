        /**
         * XU HƯỚNG & PHÂN TÍCH (Trend Analysis)
         */
        function renderTrendReport(docs, startDate, endDate, container) {
            // Group data by day
            const dailyStats = {};
            const monthlyStats = {};

            docs.forEach(doc => {
                const data = doc.data();
                const createdAt = data.createdAt?.toDate ? data.createdAt.toDate() : new Date(data.createdAt);
                const dayKey = createdAt.toISOString().split('T')[0];
                const monthKey = dayKey.substring(0, 7); // YYYY-MM

                if (!dailyStats[dayKey]) {
                    dailyStats[dayKey] = { trips: 0, km: 0 };
                }
                dailyStats[dayKey].trips++;
                dailyStats[dayKey].km += parseFloat(data.finalKm) || 0;

                if (!monthlyStats[monthKey]) {
                    monthlyStats[monthKey] = { trips: 0, km: 0 };
                }
                monthlyStats[monthKey].trips++;
                monthlyStats[monthKey].km += parseFloat(data.finalKm) || 0;
            });

            // Calculate trends
            const sortedDays = Object.keys(dailyStats).sort();
            const sortedMonths = Object.keys(monthlyStats).sort();

            // Calculate growth rates
            let tripGrowth = 0;
            if (sortedMonths.length >= 2) {
                const lastMonth = monthlyStats[sortedMonths[sortedMonths.length - 1]];
                const prevMonth = monthlyStats[sortedMonths[sortedMonths.length - 2]];
                tripGrowth = prevMonth.trips > 0 ? ((lastMonth.trips - prevMonth.trips) / prevMonth.trips * 100).toFixed(1) : 0;
            }

            // Find peak day
            let peakDay = null;
            let peakTrips = 0;
            Object.entries(dailyStats).forEach(([day, stats]) => {
                if (stats.trips > peakTrips) {
                    peakTrips = stats.trips;
                    peakDay = day;
                }
            });

            container.innerHTML = `
                <!-- Trend KPI Cards -->
                <div class="kpi-grid" style="margin-bottom: 24px;">
                    <div class="kpi-card ${parseFloat(tripGrowth) >= 0 ? 'green' : 'red'}">
                        <div class="kpi-label">📈 Tăng trưởng chuyến</div>
                        <div class="kpi-value">${tripGrowth > 0 ? '+' : ''}${tripGrowth}%</div>
                        <div class="kpi-sub">So với tháng trước</div>
                    </div>
                    <div class="kpi-card purple">
                        <div class="kpi-label">📅 Ngày cao điểm</div>
                        <div class="kpi-value" style="font-size: 18px;">${peakDay ? new Date(peakDay).toLocaleDateString('vi-VN') : '-'}</div>
                        <div class="kpi-sub">${peakTrips} chuyến</div>
                    </div>
                </div>

                <!-- Charts -->
                <div class="panel" style="margin-bottom: 20px;">
                    <div class="panel-header">
                        <span class="panel-title">📊 Số chuyến theo ngày</span>
                    </div>
                    <div class="panel-body">
                        <canvas id="daily-trips-chart" height="200"></canvas>
                    </div>
                </div>

                <!-- Monthly Summary Table -->
                <div class="panel" style="margin-top: 20px;">
                    <div class="panel-header">
                        <span class="panel-title">📅 Tổng hợp theo tháng</span>
                    </div>
                    <div class="panel-body" style="padding: 0;">
                        <div style="overflow-x: auto;">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Tháng</th>
                                        <th>Số chuyến</th>
                                        <th>Tổng Km</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${sortedMonths.map(month => {
                                        const stats = monthlyStats[month];
                                        const [year, mon] = month.split('-');
                                        return `
                                            <tr>

        /**

        function renderDepartmentReport(docs, startDate, endDate, container) {
            const deptStats = {};

            docs.forEach(doc => {

                        totalPassengers: 0,

                deptStats[dept].trips++;
                deptStats[dept].totalPassengers += data.passengerCount || 1;
                deptStats[dept].requests.push({
                    id: doc.id,
                    requesterName: data.requesterName,
                    purpose: data.purpose,
                    date: data.createdAt?.toDate()

            // Sort departments by trip count
            const sortedDepts = Object.entries(deptStats).sort((a, b) => b[1].trips - a[1].trips);

            `;

                                <div>

                                </div>
                            </div>
                            <div style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end;">
                                <span style="background: rgba(0,104,255,0.12); color: #0068FF; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;">${stats.trips} chuyến</span>
                                <span style="background: rgba(0,165,80,0.12); color: #00a550; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;">${stats.totalPassengers} người</span>

                        </div>
                        <div style="background: #e4e6eb; height: 8px; border-radius: 4px; overflow: hidden;">

                        </div>
                        <details style="margin-top: 12px;">
                            <summary style="cursor: pointer; color: #0068FF; font-size: 13px;">📋 Xem chi tiết ${stats.trips} chuyến...</summary>
                            <div style="overflow-x: auto; margin-top: 12px;">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Ngày</th>
                                            <th>Người yêu cầu</th>
                                            <th>Mục đích</th>

                                                <td>${r.date?.toLocaleDateString('vi-VN') || 'N/A'}</td>

            html += `

        /**
         * Báo cáo biểu đồ
         */
        function renderChartReport(docs, startDate, endDate, container) {
            // Group by date for timeline chart
            const dailyStats = {};
            const deptStats = {};
            const vehicleStats = {};

            docs.forEach(doc => {
                const data = doc.data();
                const dateKey = data.createdAt?.toDate().toLocaleDateString('vi-VN') || 'N/A';
                const dept = data.requesterDept || 'Khác';
                const vehicle = data.vehicleName || 'N/A';

                // Daily
                if (!dailyStats[dateKey]) dailyStats[dateKey] = { trips: 0 };
                dailyStats[dateKey].trips++;

                // Department
                if (!deptStats[dept]) deptStats[dept] = { trips: 0 };
                deptStats[dept].trips++;

                // Vehicle
                if (!vehicleStats[vehicle]) vehicleStats[vehicle] = { trips: 0 };
                vehicleStats[vehicle].trips++;
            });

            container.innerHTML = `
                <h3 class="text-xl font-bold mb-4">📈 Biểu đồ Thống kê</h3>
                <p class="text-sm text-gray-600 mb-4">Từ ${startDate.toLocaleDateString('vi-VN')} đến ${endDate.toLocaleDateString('vi-VN')}</p>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-4 rounded-lg border">
                        <h4 class="font-semibold mb-3">Số chuyến theo phòng ban</h4>
                        <canvas id="dept-trips-chart" height="250"></canvas>

                    <div class="bg-white p-4 rounded-lg border">
                        <h4 class="font-semibold mb-3">Số chuyến theo xe</h4>
                        <canvas id="vehicle-trips-chart" height="250"></canvas>
                    </div>
                    <div class="bg-white p-4 rounded-lg border md:col-span-2">
                        <h4 class="font-semibold mb-3">Số chuyến theo ngày</h4>
                        <canvas id="daily-trips-chart" height="250"></canvas>
                    </div>
                </div>
            `;

            // Wait for DOM to render
            setTimeout(() => {
                const deptLabels = Object.keys(deptStats);
                const deptTrips = deptLabels.map(d => deptStats[d].trips);

                const vehicleLabels = Object.keys(vehicleStats).slice(0, 10); // Top 10
                const vehicleTrips = vehicleLabels.map(v => vehicleStats[v].trips);

                const dailyLabels = Object.keys(dailyStats).sort();
                const dailyTrips = dailyLabels.map(d => dailyStats[d].trips);

                // Department Trips Chart (Bar)
                new Chart(document.getElementById('dept-trips-chart'), {
                    type: 'bar',
                    data: {
                        labels: deptLabels,
                        datasets: [{
                            label: 'Số chuyến',
                            data: deptTrips,
                            backgroundColor: 'rgba(99, 102, 241, 0.7)',
                            borderColor: 'rgb(99, 102, 241)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true } }
                    }
                });

                // Vehicle Trips Chart (Bar horizontal)
                new Chart(document.getElementById('vehicle-trips-chart'), {
                    type: 'bar',
                    data: {
                        labels: vehicleLabels,
                        datasets: [{
                            label: 'Số chuyến',
                            data: vehicleTrips,
                            backgroundColor: 'rgba(34, 197, 94, 0.7)',
                            borderColor: 'rgb(34, 197, 94)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        plugins: { legend: { display: false } }
                    }
                });

                // Daily Trips Chart (Line)
                new Chart(document.getElementById('daily-trips-chart'), {
                    type: 'line',
                    data: {
                        labels: dailyLabels,
                        datasets: [{
                            label: 'Số chuyến',
                            data: dailyTrips,
                            borderColor: 'rgb(59, 130, 246)',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            fill: true,
                            tension: 0.3
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true } }
                    }
                });
            }, 100);
        }

        // ========== LỊCH BẢO TRÌ XE ==========

        // Loại bảo trì
        const MAINTENANCE_TYPES = {

            tire: { name: 'Thay/Xoay lốp', icon: '🔘', interval: 20000 },

        /**
         * Tải danh sách bảo trì
         */
        async function loadMaintenanceRecords() {
            const container = document.getElementById('maintenance-list-container');
            if (!container) return;

            const vehicleFilter = document.getElementById('maintenance-filter-vehicle')?.value || '';
            const statusFilter = document.getElementById('maintenance-filter-status')?.value || 'all';

            container.innerHTML = '<div class="loader"></div>';

            try {
                let q = query(collection(db, MAINTENANCE_COLLECTION), orderBy('scheduledDate', 'desc'));

                if (vehicleFilter) {
                    q = query(collection(db, MAINTENANCE_COLLECTION),
                              where('vehicleId', '==', vehicleFilter),
                              orderBy('scheduledDate', 'desc'));
                }

                const snapshot = await getDocs(q);

                if (snapshot.empty) {
                    container.innerHTML = '<p class="text-gray-500">Chưa có lịch bảo trì nào.</p>';
                    return;
                }

                const now = new Date();
                let records = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));

                // Filter by status
                if (statusFilter === 'pending') {
                    records = records.filter(r => !r.completedDate);
                } else if (statusFilter === 'completed') {
                    records = records.filter(r => r.completedDate);
                } else if (statusFilter === 'overdue') {
                    records = records.filter(r => !r.completedDate && r.scheduledDate?.toDate() < now);
                }

                // Build table rows and card items
                let tableRows = '';
                let cardItems = '';

                for (const record of records) {
                    const scheduledDate = record.scheduledDate?.toDate();
                    const isOverdue = !record.completedDate && scheduledDate && scheduledDate < now;
                    const typeInfo = MAINTENANCE_TYPES[record.type] || MAINTENANCE_TYPES.other;

                    let statusBadge = '';
                    let statusClass = '';
                    if (record.completedDate) {
                        statusBadge = '<span class="px-2 py-1 text-xs rounded bg-green-100 text-green-800">✓ Hoàn thành</span>';
                        statusClass = '';
                    } else if (isOverdue) {
                        statusBadge = '<span class="px-2 py-1 text-xs rounded bg-red-100 text-red-800">⚠️ Quá hạn</span>';
                        statusClass = 'border-left: 4px solid #ef4444; background: #fef2f2;';
                    } else {
                        statusBadge = '<span class="px-2 py-1 text-xs rounded bg-yellow-100 text-yellow-800">⏳ Chờ bảo trì</span>';
                        statusClass = '';
                    }

                    // Table row
                    tableRows += `
                        <tr class="${isOverdue ? 'bg-red-50' : ''}">
                            <td class="px-4 py-3 whitespace-nowrap text-sm font-medium">${record.vehicleName || 'N/A'}</td>
                            <td class="px-4 py-3 whitespace-nowrap text-sm">${typeInfo.icon} ${typeInfo.name}</td>
                            <td class="px-4 py-3 whitespace-nowrap text-sm">${scheduledDate?.toLocaleDateString('vi-VN') || 'N/A'}</td>
                            <td class="px-4 py-3 whitespace-nowrap">${statusBadge}</td>
                            <td class="px-4 py-3 whitespace-nowrap text-sm">${record.cost ? formatCurrency(record.cost) : '-'}</td>
                            <td class="px-4 py-3 text-sm text-gray-500 truncate max-w-xs">${record.notes || '-'}</td>
                            <td class="px-4 py-3 whitespace-nowrap text-sm">
                                ${!record.completedDate ? `
                                    <button onclick="completeMaintenanceRecord('${record.id}')" class="text-green-600 hover:text-green-800 mr-2" title="Hoàn thành">✓</button>
                                ` : ''}
                                <button onclick="deleteMaintenanceRecord('${record.id}')" class="text-red-600 hover:text-red-800" title="Xóa">🗑️</button>
                            </td>
                        </tr>
                    `;

                    // Mobile card
                    cardItems += `
                        <div class="maintenance-mobile-card" style="${statusClass}">
                            <div class="maintenance-card-header">
                                <div>
                                    <div class="maintenance-card-vehicle">${record.vehicleName || 'N/A'}</div>
                                    <div class="maintenance-card-type">${typeInfo.icon} ${typeInfo.name}</div>
                                </div>
                                ${statusBadge}
                            </div>
                            <div class="maintenance-card-info">
                                <div class="maintenance-card-row">
                                    <span class="maintenance-card-row-label">Ngày:</span>
                                    <span class="maintenance-card-row-value">${scheduledDate?.toLocaleDateString('vi-VN') || 'N/A'}</span>
                                </div>
                                ${record.cost ? `
                                <div class="maintenance-card-row">
                                    <span class="maintenance-card-row-label">Chi phí:</span>
                                    <span class="maintenance-card-row-value maintenance-card-cost">${formatCurrency(record.cost)}</span>
                                </div>
                                ` : ''}
                                ${record.notes ? `
                                <div class="maintenance-card-row">
                                    <span class="maintenance-card-row-label">Ghi chú:</span>
                                    <span class="maintenance-card-row-value">${record.notes}</span>
                                </div>
                                ` : ''}
                            </div>
                            <div class="maintenance-card-footer">
                                ${!record.completedDate ? `
                                    <button onclick="completeMaintenanceRecord('${record.id}')" class="maintenance-card-btn complete">✓ Hoàn thành</button>
                                ` : ''}
                                <button onclick="deleteMaintenanceRecord('${record.id}')" class="maintenance-card-btn delete">Xóa</button>
                            </div>
                        </div>
                    `;
                }

                container.innerHTML = `
                    <!-- Desktop Table -->
                    <div class="maintenance-table-container">
                        <div class="table-responsive">
                            <table class="min-w-full divide-y divide-gray-200">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Xe</th>
                                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Loại bảo trì</th>
                                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ngày dự kiến</th>
                                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Trạng thái</th>
                                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Chi phí</th>
                                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ghi chú</th>
                                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Hành động</th>
                                    </tr>
                                </thead>
                                <tbody class="bg-white divide-y divide-gray-200">
                                    ${tableRows}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Mobile Cards -->
                    <div class="maintenance-cards-container">
                        ${cardItems}
                    </div>
                `;

            } catch (error) {
                console.error('Error loading maintenance records:', error);
                container.innerHTML = '<p class="text-red-500">Lỗi khi tải danh sách bảo trì.</p>';
            }
        }

                        scheduledDate: Timestamp.fromDate(new Date(scheduledDate)),
                        cost,
                        notes,
                        completedDate: null,
                        createdAt: Timestamp.now(),
                        createdBy: currentUserId,
                        createdByName: currentUserName
                    });

                    showToast('success', 'Đã thêm lịch bảo trì', `Lịch bảo trì cho xe ${vehicleName} đã được tạo.`, 3000);
                    closeModal();
                    loadMaintenanceRecords();
                } catch (error) {
                    console.error('Error adding maintenance:', error);
                    alert('Lỗi khi thêm lịch bảo trì. Vui lòng thử lại.');
                }
            });
        }

        /**
         * Hoàn thành bảo trì
         */
        async function completeMaintenanceRecord(recordId) {
            const actualCost = prompt('Nhập chi phí thực tế (VNĐ):');
            if (actualCost === null) return;

            try {
                const recordDoc = await getDoc(doc(db, MAINTENANCE_COLLECTION, recordId));
                const recordData = recordDoc.data();

                await updateDoc(doc(db, MAINTENANCE_COLLECTION, recordId), {
                    completedDate: Timestamp.now(),
                    actualCost: parseInt(actualCost) || recordData.cost || 0,
                    completedBy: currentUserId,
                    completedByName: currentUserName
                });

                // Nếu xe đang trong trạng thái maintenance, đổi về available
                if (recordData.vehicleId) {
                    const vehicleDoc = await getDoc(doc(db, VEHICLES_COLLECTION, recordData.vehicleId));
                    if (vehicleDoc.exists() && vehicleDoc.data().status === 'maintenance') {
                        await updateDoc(doc(db, VEHICLES_COLLECTION, recordData.vehicleId), {
                            status: 'available'
                        });
                    }
                }

                showToast('success', 'Hoàn thành bảo trì', 'Bảo trì đã được đánh dấu hoàn thành.', 3000);
                loadMaintenanceRecords();
            } catch (error) {
                console.error('Error completing maintenance:', error);
                alert('Lỗi khi cập nhật. Vui lòng thử lại.');
            }
        }

        /**
         * Xóa lịch bảo trì
         */
        async function deleteMaintenanceRecord(recordId) {
            if (!confirm('Bạn có chắc muốn xóa lịch bảo trì này?')) return;

            try {
                await deleteDoc(doc(db, MAINTENANCE_COLLECTION, recordId));
                showToast('success', 'Đã xóa', 'Lịch bảo trì đã được xóa.', 3000);
                loadMaintenanceRecords();
            } catch (error) {
                console.error('Error deleting maintenance:', error);
                alert('Lỗi khi xóa. Vui lòng thử lại.');
            }
        }

        /**
         * Kiểm tra và nhắc nhở bảo trì sắp đến hạn
         */
        async function checkMaintenanceReminders() {
            if (!['admin', 'operator', 'office_leader'].includes(currentUserRole)) return;

            try {
                const now = new Date();
                const nextWeek = new Date();
                nextWeek.setDate(nextWeek.getDate() + 7);

                const q = query(
                    collection(db, MAINTENANCE_COLLECTION),
                    where('completedDate', '==', null),
                    where('scheduledDate', '<=', Timestamp.fromDate(nextWeek))
                );

                const snapshot = await getDocs(q);

                // Gộp thông báo thay vì hiển thị từng cái
                let overdueCount = 0;
                let upcomingCount = 0;

                snapshot.docs.forEach(doc => {
                    const data = doc.data();
                    const scheduledDate = data.scheduledDate?.toDate();

                    if (scheduledDate && scheduledDate <= now) {
                        overdueCount++;
                    } else if (scheduledDate) {
                        upcomingCount++;
                    }
                });

                // Chỉ hiện 1 toast tổng hợp nếu có
                if (overdueCount > 0) {
                    showToast('error', '⚠️ Bảo trì quá hạn',
                        `Có ${overdueCount} lịch bảo trì đã quá hạn. Xem chi tiết tại tab Quản lý Xe > Bảo trì.`,
                        10000);
                } else if (upcomingCount > 0) {
                    showToast('warning', '🔧 Nhắc bảo trì',
                        `Có ${upcomingCount} lịch bảo trì sắp đến hạn trong 7 ngày tới.`,
                        8000);
                }
            } catch (error) {
                console.error('Error checking maintenance reminders:', error);
            }
        }

        // ========== HỆ THỐNG CHUÔNG THÔNG BÁO ==========
        let notificationUnsubscribe = null;
        let userNotifications = [];

        // Toggle dropdown
        window.toggleNotificationDropdown = function(event) {
            event.stopPropagation();
            const dropdown = document.getElementById('notificationDropdown');
            dropdown.classList.toggle('show');
        };

        // Close dropdown khi click ra ngoài
        document.addEventListener('click', function(event) {
            const bell = document.getElementById('notificationBell');
            const dropdown = document.getElementById('notificationDropdown');
            if (bell && dropdown && !bell.contains(event.target)) {
                dropdown.classList.remove('show');
            }
        });

        // Subscribe to notifications
        function subscribeToNotifications(userId) {
            if (notificationUnsubscribe) {
                notificationUnsubscribe();
            }

            // Query notifications for this user
            const notifQuery = query(
                collection(db, 'notifications'),
                where('targetIds', 'array-contains', userId),
                where('status', '==', 'active'),
                orderBy('createdAt', 'desc')
            );

            notificationUnsubscribe = onSnapshot(notifQuery, (snapshot) => {
                userNotifications = [];
                snapshot.forEach(doc => {
                    userNotifications.push({ id: doc.id, ...doc.data() });
                });
                renderNotifications();
                updateNotificationBadge();
            }, (error) => {
                console.error('Error subscribing to notifications:', error);
            });
        }

        // Render notifications
        function renderNotifications() {
            const listContainer = document.getElementById('notificationList');
            if (!listContainer) return;

            if (userNotifications.length === 0) {
                listContainer.innerHTML = `
                    <div class="notification-empty">
                        <div class="notification-empty-icon">🔔</div>
                        <p>Chưa có thông báo nào</p>
                    </div>
                `;
                return;
            }

            listContainer.innerHTML = userNotifications.map(notif => {
                const isUnread = !notif.readBy?.includes(currentUserId);
                const createdAt = notif.createdAt?.toDate ? notif.createdAt.toDate() : new Date(notif.createdAt);
                const timeAgo = getTimeAgo(createdAt);
                const priorityClass = notif.priority || 'normal';

                return `
                    <div class="notification-item ${isUnread ? 'unread' : ''}" data-id="${notif.id}">
                        <div class="notification-item-header">
                            <span class="notification-item-title">
                                ${notif.title || 'Thông báo'}
                                ${priorityClass !== 'normal' ? `<span class="notification-priority ${priorityClass}">${priorityClass === 'urgent' ? 'Khẩn cấp' : 'Cao'}</span>` : ''}
                            </span>
                            <span class="notification-item-time">${timeAgo}</span>
                        </div>
                        <div class="notification-item-content">${notif.content || ''}</div>
                        <div class="notification-item-actions">
                            ${isUnread ? `<button class="notification-item-btn read" onclick="markAsRead('${notif.id}', event)">✓ Đã đọc</button>` : ''}
                            <button class="notification-item-btn delete" onclick="deleteNotification('${notif.id}', event)">🗑️ Xóa</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Update badge count
        function updateNotificationBadge() {
            const badge = document.getElementById('notificationBadge');
            if (!badge) return;

            const unreadCount = userNotifications.filter(n => !n.readBy?.includes(currentUserId)).length;

            if (unreadCount > 0) {
                badge.textContent = unreadCount > 99 ? '99+' : unreadCount;
                badge.style.display = 'flex';
            } else {
                badge.style.display = 'none';
            }
        }

        // Mark single notification as read
        window.markAsRead = async function(notificationId, event) {
            event.stopPropagation();
            try {
                const notifRef = doc(db, 'notifications', notificationId);
                await updateDoc(notifRef, {
                    readBy: arrayUnion(currentUserId)
                });
                showToast('success', 'Thành công', 'Đã đánh dấu đã đọc');
            } catch (error) {
                console.error('Error marking as read:', error);
            }
        };

        // Mark all as read
        window.markAllAsRead = async function() {
            if (userNotifications.length === 0) return;

            try {
                const batch = writeBatch(db);
                const unreadNotifs = userNotifications.filter(n => !n.readBy?.includes(currentUserId));

                for (const notif of unreadNotifs) {
                    const notifRef = doc(db, 'notifications', notif.id);
                    const currentReadBy = notif.readBy || [];
                    if (!currentReadBy.includes(currentUserId)) {
                        currentReadBy.push(currentUserId);
                        batch.update(notifRef, { readBy: currentReadBy });
                    }
                }

                await batch.commit();
                showToast('success', 'Thành công', 'Đã đánh dấu tất cả đã đọc');
            } catch (error) {
                console.error('Error marking all as read:', error);
                showToast('error', 'Lỗi', 'Không thể đánh dấu đã đọc');
            }
        };

        // Delete single notification (mark as deleted for this user)
        window.deleteNotification = async function(notificationId, event) {
            event.stopPropagation();
            if (!confirm('Bạn có chắc muốn xóa thông báo này?')) return;

            try {
                const notifRef = doc(db, 'notifications', notificationId);
                const notifDoc = await getDoc(notifRef);

                if (notifDoc.exists()) {
                    const data = notifDoc.data();
                    const targetIds = data.targetIds || [];
                    const newTargetIds = targetIds.filter(id => id !== currentUserId);

                    if (newTargetIds.length === 0) {
                        // No more targets, delete the notification
                        await deleteDoc(notifRef);
                    } else {
                        // Remove current user from targets
                        await updateDoc(notifRef, { targetIds: newTargetIds });
                    }
                }

                showToast('success', 'Thành công', 'Đã xóa thông báo');
            } catch (error) {
                console.error('Error deleting notification:', error);
                showToast('error', 'Lỗi', 'Không thể xóa thông báo');
            }
        };

        // Delete all notifications for current user
        window.deleteAllNotifications = async function() {
            if (userNotifications.length === 0) return;
            if (!confirm('Bạn có chắc muốn xóa TẤT CẢ thông báo?')) return;

            try {
                const batch = writeBatch(db);

                for (const notif of userNotifications) {
                    const notifRef = doc(db, 'notifications', notif.id);
                    const targetIds = notif.targetIds || [];
                    const newTargetIds = targetIds.filter(id => id !== currentUserId);

                    if (newTargetIds.length === 0) {
                        batch.delete(notifRef);
                    } else {
                        batch.update(notifRef, { targetIds: newTargetIds });
                    }
                }

                await batch.commit();
                showToast('success', 'Thành công', 'Đã xóa tất cả thông báo');
            } catch (error) {
                console.error('Error deleting all notifications:', error);
                showToast('error', 'Lỗi', 'Không thể xóa thông báo');
            }
        };

        // Helper: Get time ago string
        function getTimeAgo(date) {
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffMins < 1) return 'Vừa xong';
            if (diffMins < 60) return `${diffMins} phút trước`;
            if (diffHours < 24) return `${diffHours} giờ trước`;
            if (diffDays < 7) return `${diffDays} ngày trước`;
            return date.toLocaleDateString('vi-VN');
        }

        // Cleanup on logout
        function cleanupNotifications() {
            if (notificationUnsubscribe) {
                notificationUnsubscribe();
                notificationUnsubscribe = null;
            }
            userNotifications = [];
            const badge = document.getElementById('notificationBadge');
            if (badge) badge.style.display = 'none';
        }

        // === PERMISSION LABELS cho app Điều xe ===
        const DIEUXE_PERM_LABELS = {
            'dieuxe:*': { icon: '👑', label: 'Toàn quyền', color: '#dc2626' },
            'vehicle:view': { icon: '👁️', label: 'Xem xe', color: '#64748b' },
            'vehicle:manage': { icon: '🚗', label: 'Quản lý xe', color: '#2563eb' },
            'driver:view': { icon: '👁️', label: 'Xem tài xế', color: '#64748b' },
            'driver:manage': { icon: '👨‍✈️', label: 'Quản lý tài xế', color: '#2563eb' },
            'request:create': { icon: '📝', label: 'Tạo yêu cầu', color: '#059669' },
            'request:view_all': { icon: '📋', label: 'Xem tất cả yêu cầu', color: '#7c3aed' },
            'request:approve': { icon: '✅', label: 'Duyệt yêu cầu', color: '#059669' },
            'dispatch:manage': { icon: '🚦', label: 'Điều phối xe', color: '#dc2626' },
            'report:view': { icon: '📊', label: 'Xem báo cáo', color: '#0891b2' },
            'report:export': { icon: '📤', label: 'Xuất báo cáo', color: '#0891b2' },
            'settings:manage': { icon: '⚙️', label: 'Cài đặt', color: '#64748b' }
        };

        function getDieuxePermLabel(permId) {
            return DIEUXE_PERM_LABELS[permId] || { icon: '🔹', label: permId, color: '#64748b' };
        }

        // Hiển thị modal xem quyền của tôi
        window.showMyPermissions = function() {
            const modal = document.getElementById('myPermsModal');
            const content = document.getElementById('myPermsContent');

            if (!modal || !content) return;

            modal.style.display = 'flex';

            // Lấy quyền từ Permissions API
            const isGlobalAdmin = typeof Permissions !== 'undefined' ? Permissions.isGlobalAdmin() : false;
            const userRoles = typeof Permissions !== 'undefined' ? Permissions.getAppRoles('dieuxe') : [];
            const roleDefs = typeof Permissions !== 'undefined' ? Permissions.getRoleDefinitions('dieuxe') : [];
            const effectivePerms = typeof Permissions !== 'undefined' ? Permissions.getEffectivePermissions('dieuxe') : [];

            let html = '';

            // Hiển thị Global Admin
            if (isGlobalAdmin) {
                html += `
                    <div style="background: linear-gradient(135deg, #dc2626, #b91c1c); color: white; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px;">
                        <div style="font-weight: 600; font-size: 16px;">👑 Global Admin</div>
                        <div style="font-size: 13px; opacity: 0.9; margin-top: 4px;">Bạn có toàn quyền trên tất cả ứng dụng</div>
                    </div>
                `;
            }

            // Hiển thị quyền app Điều xe
            if (userRoles.length > 0) {
                html += `<div style="margin-bottom: 16px;">
                    <div style="font-weight: 600; margin-bottom: 8px; color: #000000;">📋 Vai trò trong app Điều xe:</div>`;

                userRoles.forEach(roleId => {
                    const roleDef = roleDefs.find(r => r.roleId === roleId);
                    const roleName = roleDef?.name || roleId;
                    html += `<span style="display: inline-block; background: #dbeafe; color: #1e40af; padding: 4px 12px; border-radius: 20px; margin: 4px; font-size: 13px;">${roleName}</span>`;
                });

                html += `</div>`;

                // Hiển thị các quyền cụ thể từ role
                if (effectivePerms.length > 0) {
                    html += `<div style="margin-bottom: 16px;">
                        <div style="font-weight: 600; margin-bottom: 8px; color: #000000;">🔐 Quyền chi tiết (${effectivePerms.length} quyền):</div>
                        <div style="display: flex; flex-wrap: wrap; gap: 8px;">`;

                    effectivePerms.forEach(perm => {
                        const permInfo = getDieuxePermLabel(perm);
                        html += `<div style="display: flex; align-items: center; gap: 6px; background: #f1f5f9; padding: 6px 12px; border-radius: 6px; font-size: 13px;">
                            <span>${permInfo.icon}</span>
                            <span style="color: ${permInfo.color};">${permInfo.label}</span>
                        </div>`;
                    });

                    html += `</div></div>`;
                }
            } else if (!isGlobalAdmin) {
                html += `<div style="text-align: center; padding: 24px; color: #94a3b8;">
                    <div style="font-size: 48px; margin-bottom: 12px;">🔒</div>
                    <div>Bạn chưa được phân quyền cho app này</div>
                    <div style="font-size: 13px; margin-top: 8px;">Liên hệ quản trị viên để được cấp quyền</div>
                </div>`;
            }

            content.innerHTML = html;
        };

        window.closeMyPermsModal = function() {
            const modal = document.getElementById('myPermsModal');
            if (modal) modal.style.display = 'none';
        };

    </script>
