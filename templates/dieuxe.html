        async function generateDriverVehicleReport() {
            const startDateInput = document.getElementById('driver-report-start-date').value;
            const endDateInput = document.getElementById('driver-report-end-date').value;
            const resultsContainer = document.getElementById('driver-report-results');

            if (!startDateInput || !endDateInput) {
                alert('Vui lòng chọn ngày bắt đầu và ngày kết thúc!');
                return;
            }

            const startDate = new Date(startDateInput);
            startDate.setHours(0, 0, 0, 0);
            const endDate = new Date(endDateInput);
            endDate.setHours(23, 59, 59, 999);

            if (startDate > endDate) {
                alert('Ngày bắt đầu phải trước ngày kết thúc!');
                return;
            }

            resultsContainer.innerHTML = '<div class="loader"></div>';

            try {
                // Get all completed requests driven by this driver in date range
                // Bao gồm cả "completed" và "completed_by_driver"
                // Query theo completedAt hoặc startTime (fallback)
                const q1 = query(
                    collection(db, REQUESTS_COLLECTION),
                    where("driverId", "==", currentUserId),
                    where("status", "==", "completed"),
                    where("completedAt", ">=", Timestamp.fromDate(startDate)),
                    where("completedAt", "<=", Timestamp.fromDate(endDate))
                );

                const q2 = query(
                    collection(db, REQUESTS_COLLECTION),
                    where("driverId", "==", currentUserId),
                    where("status", "==", "completed_by_driver"),
                    where("completedAt", ">=", Timestamp.fromDate(startDate)),
                    where("completedAt", "<=", Timestamp.fromDate(endDate))
                );

                const [snapshot1, snapshot2] = await Promise.all([getDocs(q1), getDocs(q2)]);

                // Combine results
                const allDocs = [...snapshot1.docs, ...snapshot2.docs];
                const snapshot = {
                    empty: allDocs.length === 0,
                    docs: allDocs
                };

                if (snapshot.empty) {
                    resultsContainer.innerHTML = `
                        <p class="text-gray-500">Bạn không có chuyến đi nào hoàn thành trong khoảng thời gian này.</p>
                    `;
                    return;
                }

                // Group by vehicle
                const vehicleStats = {};

                snapshot.docs.forEach(doc => {
                    const data = doc.data();
                    const vehicleId = data.vehicleId;
                    const vehicleName = data.vehicleName || 'N/A';
                    const vehiclePlate = data.vehiclePlate || 'N/A';
                    const finalKm = parseFloat(data.finalKm) || 0;

                    if (!vehicleStats[vehicleId]) {
                        vehicleStats[vehicleId] = {
                            vehicleName,
                            vehiclePlate,
                            trips: []
                        };
                    }

                    const tripDate = data.completedAt?.toDate() || data.startTime?.toDate() || new Date();

                    vehicleStats[vehicleId].trips.push({
                        requestId: doc.id,
                        finalKm,
                        completedDate: tripDate,
                        status: data.status,
                        requesterName: data.requesterName,
                        requesterDept: data.requesterDept,
                        tripNotes: data.tripNotes || ''
                    });
                });

                // Calculate km for each trip (current - previous)
                Object.keys(vehicleStats).forEach(vehicleId => {
                    const vehicle = vehicleStats[vehicleId];

                    // Sort trips by date
                    vehicle.trips.sort((a, b) => a.completedDate - b.completedDate);

                    // Calculate km difference for each trip
                    let totalKm = 0;
                    for (let i = 0; i < vehicle.trips.length; i++) {
                        if (i === 0) {
                            vehicle.trips[i].kmDiff = vehicle.trips[i].finalKm;
                        } else {
                            vehicle.trips[i].kmDiff = vehicle.trips[i].finalKm - vehicle.trips[i - 1].finalKm;
                        }
                        totalKm += vehicle.trips[i].kmDiff;
                    }

                    vehicle.totalKm = totalKm;
                });

                // Render report
                let reportHTML = `
                    <h3 class="text-xl font-bold mb-4">Kết quả báo cáo</h3>
                    <p class="text-sm text-gray-600 mb-4">Từ ${startDate.toLocaleDateString('vi-VN')} đến ${endDate.toLocaleDateString('vi-VN')}</p>
                `;

                // Overall summary
                const allVehicles = Object.values(vehicleStats);
                const grandTotalKm = allVehicles.reduce((sum, v) => sum + v.totalKm, 0);
                
                reportHTML += `
                    <div class="bg-blue-50 p-4 rounded-lg mb-6 border border-blue-200">
                        <h4 class="font-semibold text-blue-900 mb-2">Tổng quan chuyến đi của tôi</h4>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <p class="text-sm text-gray-700">Số xe đã lái:</p>
                                <p class="text-2xl font-bold text-blue-600">${Object.keys(vehicleStats).length}</p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-700">Tổng số chuyến:</p>
                                <p class="text-2xl font-bold text-blue-600">${snapshot.docs.length}</p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-700">Tổng Km:</p>
                                <p class="text-2xl font-bold text-green-600">${grandTotalKm.toFixed(2)} km</p>
                            </div>
                        </div>
                    </div>
                `;

                // Per vehicle breakdown
                reportHTML += `<h4 class="font-semibold mb-3 text-lg">Chi tiết theo xe</h4>`;

                Object.keys(vehicleStats).forEach(vehicleId => {
                    const vehicle = vehicleStats[vehicleId];

                    reportHTML += `
                        <div class="border rounded-lg p-4 mb-4">
                            <div class="flex justify-between items-center mb-3">
                                <h5 class="font-bold text-lg">${vehicle.vehicleName} - ${vehicle.vehiclePlate}</h5>
                                <div class="text-right">
                                    <p class="text-sm text-gray-600">Số chuyến: <span class="font-bold text-blue-600">${vehicle.trips.length}</span></p>
                                    <p class="text-sm text-gray-600">Tổng: <span class="font-bold text-green-600">${vehicle.totalKm.toFixed(2)} km</span></p>
                                                                    </div>
                            </div>
                            <table class="min-w-full divide-y divide-gray-200 text-sm">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">Ngày</th>
                                        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">Người đi</th>
                                        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">Phòng ban</th>
                                        <th class="px-3 py-2 text-right text-xs font-medium text-gray-500 uppercase">Số Km cuối</th>
                                        <th class="px-3 py-2 text-right text-xs font-medium text-gray-500 uppercase">Km chuyến này</th>
                                        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">Ghi chú</th>
                                    </tr>
                                </thead>
                                <tbody class="bg-white divide-y divide-gray-200">
                                    ${vehicle.trips.map(trip => `
                                        <tr>
                                            <td class="px-3 py-2 whitespace-nowrap">${trip.completedDate.toLocaleDateString('vi-VN')}</td>
                                            <td class="px-3 py-2 whitespace-nowrap">${trip.requesterName}</td>
                                            <td class="px-3 py-2 whitespace-nowrap">${trip.requesterDept}</td>
                                            <td class="px-3 py-2 whitespace-nowrap text-right">${trip.finalKm.toFixed(2)}</td>
                                            <td class="px-3 py-2 whitespace-nowrap text-right font-semibold text-green-600">${trip.kmDiff.toFixed(2)}</td>
                                            <td class="px-3 py-2 text-xs">${trip.tripNotes || '-'}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                });

                resultsContainer.innerHTML = reportHTML;

                // Show export buttons and store report data
                document.getElementById('driver-export-pdf-btn').style.display = 'block';
                document.getElementById('driver-export-excel-btn').style.display = 'block';
                window.driverReportData = {
                    vehicleStats,
                    totalTrips: snapshot.docs.length,
                    totalVehicles: Object.keys(vehicleStats).length,
                    grandTotalKm,
                    startDate,
                    endDate
                };

            } catch (error) {
                console.error('Error generating driver report:', error);
                resultsContainer.innerHTML = `
                    <p class="text-red-500">Lỗi khi tạo báo cáo: ${error.message}</p>
                `;
            }
        }

                    const tripDate = data.completedAt?.toDate() || data.startTime?.toDate() || new Date();

                    vehicleStats[vehicleId].trips.push({
                        requestId: doc.id,
                        finalKm,
                        completedDate: tripDate,
                        status: data.status,
                        requesterName: data.requesterName,
                        requesterDept: data.requesterDept,
                        tripNotes: data.tripNotes || ''
                    });
                });

                // Fetch init_km for each vehicle
                const vehicleInitKmPromises = Object.keys(vehicleStats).map(async vehicleId => {
                    try {
                        const vehicleDoc = await getDoc(doc(db, VEHICLES_COLLECTION, vehicleId));
                        if (vehicleDoc.exists()) {
                            vehicleStats[vehicleId].init_km = vehicleDoc.data().init_km || 0;
                        } else {
                            vehicleStats[vehicleId].init_km = 0;
                        }
                    } catch (error) {
                        console.error(`Error fetching vehicle ${vehicleId}:`, error);
                        vehicleStats[vehicleId].init_km = 0;
                    }
                });
                await Promise.all(vehicleInitKmPromises);

                // Calculate km for each trip (current - previous)
                Object.keys(vehicleStats).forEach(vehicleId => {
                    const vehicle = vehicleStats[vehicleId];

                    // Sort trips by date
                    vehicle.trips.sort((a, b) => a.completedDate - b.completedDate);

                    // Calculate km difference for each trip
                    let totalKm = 0;
                    for (let i = 0; i < vehicle.trips.length; i++) {
                        if (i === 0) {
                            // First trip: km = finalKm - init_km
                            const initKm = vehicle.init_km || 0;
                            vehicle.trips[i].kmDiff = vehicle.trips[i].finalKm - initKm;
                        } else {
                            // Subsequent trips: km = current finalKm - previous finalKm
                            vehicle.trips[i].kmDiff = vehicle.trips[i].finalKm - vehicle.trips[i - 1].finalKm;
                        }
                        totalKm += vehicle.trips[i].kmDiff;
                    }

                    vehicle.totalKm = totalKm;
                });

                // Render report
                let reportHTML = `
                    <h3 class="text-xl font-bold mb-4">Kết quả báo cáo</h3>
                    <p class="text-sm text-gray-600 mb-4">Từ ${startDate.toLocaleDateString('vi-VN')} đến ${endDate.toLocaleDateString('vi-VN')}</p>
                `;

                // Overall summary
                const allVehicles = Object.values(vehicleStats);
                const grandTotalKm = allVehicles.reduce((sum, v) => sum + v.totalKm, 0);
                
                reportHTML += `
                    <div class="bg-blue-50 p-4 rounded-lg mb-6 border border-blue-200">
                        <h4 class="font-semibold text-blue-900 mb-2">Tổng quan</h4>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <p class="text-sm text-gray-700">Tổng số xe:</p>
                                <p class="text-2xl font-bold text-blue-600">${Object.keys(vehicleStats).length}</p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-700">Tổng số chuyến:</p>
                                <p class="text-2xl font-bold text-blue-600">${snapshot.docs.length}</p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-700">Tổng Km:</p>
                                <p class="text-2xl font-bold text-green-600">${grandTotalKm.toFixed(2)} km</p>
                            </div>
                        </div>
                    </div>
                `;

                // Per vehicle breakdown
                reportHTML += `<h4 class="font-semibold mb-3 text-lg">Chi tiết theo xe</h4>`;

                Object.keys(vehicleStats).forEach(vehicleId => {
                    const vehicle = vehicleStats[vehicleId];

                    reportHTML += `
                        <div class="border rounded-lg p-4 mb-4">
                            <div class="flex justify-between items-center mb-3">
                                <h5 class="font-bold text-lg">${vehicle.vehicleName} - ${vehicle.vehiclePlate}</h5>
                                <div class="text-right">
                                    <p class="text-sm text-gray-600">Số chuyến: <span class="font-bold text-blue-600">${vehicle.trips.length}</span></p>
                                    <p class="text-sm text-gray-600">Tổng: <span class="font-bold text-green-600">${vehicle.totalKm.toFixed(2)} km</span></p>
                                                                    </div>
                            </div>
                            <table class="min-w-full divide-y divide-gray-200 text-sm">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">Ngày</th>
                                        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">Người đi</th>
                                        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">Phòng ban</th>
                                        <th class="px-3 py-2 text-right text-xs font-medium text-gray-500 uppercase">Số Km cuối</th>
                                        <th class="px-3 py-2 text-right text-xs font-medium text-gray-500 uppercase">Km chuyến này</th>
                                        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">Ghi chú</th>
                                    </tr>
                                </thead>
                                <tbody class="bg-white divide-y divide-gray-200">
                                    ${vehicle.trips.map(trip => `
                                        <tr>
                                            <td class="px-3 py-2 whitespace-nowrap">${trip.completedDate.toLocaleDateString('vi-VN')}</td>
                                            <td class="px-3 py-2 whitespace-nowrap">${trip.requesterName}</td>
                                            <td class="px-3 py-2 whitespace-nowrap">${trip.requesterDept}</td>
                                            <td class="px-3 py-2 whitespace-nowrap text-right">${trip.finalKm.toFixed(2)}</td>
                                            <td class="px-3 py-2 whitespace-nowrap text-right font-semibold text-green-600">${trip.kmDiff.toFixed(2)}</td>
                                            <td class="px-3 py-2 text-xs">${trip.tripNotes || '-'}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                });

                resultsContainer.innerHTML = reportHTML;

                // Show export buttons and store report data
                document.getElementById('export-pdf-btn').style.display = 'block';
                document.getElementById('export-excel-btn').style.display = 'block';
                window.vehicleReportData = {
                    vehicleStats,
                    totalTrips: snapshot.docs.length,
                    totalVehicles: Object.keys(vehicleStats).length,
                    grandTotalKm,
                    startDate,
                    endDate
                };

            } catch (error) {
                console.error('Error generating report:', error);
                resultsContainer.innerHTML = `
                    <p class="text-red-500">Lỗi khi tạo báo cáo: ${error.message}</p>

        // PDF Export Functions
        function exportDriverReportToPDF() {
            if (!window.driverReportData) {
                alert('Vui lòng tạo báo cáo trước khi xuất PDF!');
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4'); // landscape orientation

            // Add Vietnamese-compatible font (Roboto) if available
            if (typeof RobotoRegularFont !== 'undefined' && RobotoRegularFont && RobotoRegularFont.length > 100) {
                try {
                    doc.addFileToVFS('Roboto-Regular.ttf', RobotoRegularFont);
                    doc.addFont('Roboto-Regular.ttf', 'Roboto', 'normal');
                    doc.setFont('Roboto');
                } catch (e) {
                    console.warn('Could not load Vietnamese font:', e.message);
                }
            } else {
                console.warn('Vietnamese font not available - using default font');
            }

            const data = window.driverReportData;

            // Title
            doc.setFontSize(16);
            doc.setFont('Roboto', 'normal');
            doc.text('BÁO CÁO CHUYẾN ĐI CỦA TÀI XẾ', pageWidth / 2, 15, { align: 'center' });

            doc.setFontSize(10);
            doc.setFont('Roboto', 'normal');
            doc.text(`Từ ${data.startDate.toLocaleDateString('vi-VN')} đến ${data.endDate.toLocaleDateString('vi-VN')}`, pageWidth / 2, 22, { align: 'center' });

            // Summary section
            doc.setFontSize(11);
            doc.setFont('Roboto', 'normal');
            doc.text('TỔNG QUAN', 14, 32);

            doc.setFontSize(9);
            doc.setFont('Roboto', 'normal');
            let yPos = 38;
            doc.text(`Số xe đã lái: ${data.totalVehicles}`, 14, yPos);
            doc.text(`Tổng số chuyến: ${data.totalTrips}`, 80, yPos);
            yPos += 6;
            doc.text(`Tổng Km: ${data.grandTotalKm.toFixed(2)} km`, 14, yPos);

            yPos += 10;

            // Details for each vehicle
            Object.keys(data.vehicleStats).forEach((vehicleId, index) => {
                const vehicle = data.vehicleStats[vehicleId];

                // Check if we need a new page
                if (yPos > 170) {
                    doc.addPage();
                    yPos = 20;
                }

                doc.setFontSize(10);
                doc.setFont('Roboto', 'normal');
                doc.text(`${vehicle.vehicleName} - ${vehicle.vehiclePlate}`, 14, yPos);
                doc.setFont('Roboto', 'normal');
                doc.text(`Số chuyến: ${vehicle.trips.length} | Tổng Km: ${vehicle.totalKm.toFixed(2)} km`, 14, yPos + 5);

                yPos += 10;

                // Table for trips
                const tableData = vehicle.trips.map(trip => [
                    trip.completedDate.toLocaleDateString('vi-VN'),
                    trip.requesterName,
                    trip.requesterDept,
                    trip.finalKm.toFixed(2),
                    trip.kmDiff.toFixed(2),
                    trip.tripNotes || '-'

                doc.autoTable({
                    startY: yPos,
                    head: [['Ngày', 'Người đi', 'Phòng ban', 'Km cuối', 'Km chuyến', 'Ghi chú']],
                    body: tableData,
                    theme: 'grid',
                    styles: {
                        fontSize: 8,
                        cellPadding: 2,
                        font: 'Roboto',
                        fontStyle: 'normal'
                    },
                    headStyles: {
                        fillColor: [79, 70, 229],
                        textColor: 255,
                        fontStyle: 'normal',
                        font: 'Roboto'
                    },
                    margin: { left: 14, right: 14 },
                    didDrawPage: function(data) {
                        // Footer
                        doc.setFont('Roboto', 'normal');
                        doc.setFontSize(8);
                        doc.text(`Trang ${doc.internal.getNumberOfPages()}`, pageWidth - 20, doc.internal.pageSize.getHeight() - 10);

            });

            // Add signature area at the bottom right of the last page
            const pageHeight = doc.internal.pageSize.getHeight();
            const signatureX = pageWidth - 60; // 60mm from right edge
            const signatureY = pageHeight - 60; // 60mm from bottom (increased for more space)

            doc.setFontSize(12);
            doc.setFont('Roboto', 'normal');
            // Draw text twice with slight offset to simulate bold
            doc.text('Người báo cáo', signatureX, signatureY, { align: 'center' });

            // Then add the name of the person who exported
            doc.setFontSize(10);
            doc.setFont('Roboto', 'normal');
            doc.text(currentUserName || 'N/A', signatureX, signatureY + 30, { align: 'center' });

            // Save PDF
            const fileName = `bao-cao-tai-xe-${data.startDate.toLocaleDateString('vi-VN').replace(/\//g, '-')}_${data.endDate.toLocaleDateString('vi-VN').replace(/\//g, '-')}.pdf`;
            doc.save(fileName);
        }

        // Generate Dispatch Order PDF (Lệnh điều xe)
        function generateDispatchOrderPDF(requestId, data, driverMobile = '') {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a5'); // Landscape A5 - nhỏ gọn chuyên nghiệp

            if (typeof RobotoRegularFont !== 'undefined' && RobotoRegularFont && RobotoRegularFont.length > 100) {
                try {
                    doc.addFileToVFS('Roboto-Regular.ttf', RobotoRegularFont);
                    doc.addFont('Roboto-Regular.ttf', 'Roboto', 'normal');
                    doc.setFont('Roboto');
                } catch (e) { console.warn('Font error:', e.message); }
            }

            const pw = doc.internal.pageSize.getWidth(); // ~210
            const ph = doc.internal.pageSize.getHeight(); // ~148
            const m = 12; // margin
            let y = 10;
            const bold = (text, x, yy, opts) => { doc.text(text, x, yy, opts); doc.text(text, x + 0.25, yy, opts); };
            const gray = (r,g,b) => doc.setTextColor(r||0,g||0,b||0);
            const orderDate = data.assignedAt ? data.assignedAt.toDate() : new Date();
            const startTime = data.startTime.toDate();
            const endTime = data.endTime.toDate();
            const fmtTime = (d) => d.toLocaleTimeString('vi-VN', {hour:'2-digit',minute:'2-digit'});
            const fmtDate = (d) => d.toLocaleDateString('vi-VN', {day:'2-digit',month:'2-digit',year:'numeric'});

            // ===== HEADER ROW =====
            // Left: Company
            doc.setFontSize(8);
            gray(100,100,100);
            doc.text('CÔNG TY CP CAO SU PHÚ HÒA', m, y);
            doc.text('Phòng PTQLKCN', m, y + 3.5);

            // Right: Số + Ngày
            doc.text(`Số: ${requestId.substring(0, 8).toUpperCase()}`, pw - m, y, { align: 'right' });
            doc.text(`Ngày ${orderDate.getDate()}/${orderDate.getMonth()+1}/${orderDate.getFullYear()}`, pw - m, y + 3.5, { align: 'right' });

            // ===== TITLE =====
            y += 12;
            gray(0,0,0);
            doc.setFontSize(16);
            bold('LỆNH ĐIỀU XE', pw / 2, y, { align: 'center' });

            // ===== HORIZONTAL LINE =====
            y += 5;
            doc.setDrawColor(0,102,255);
            doc.setLineWidth(0.8);
            doc.line(pw/2 - 30, y, pw/2 + 30, y);

            // ===== 2-COLUMN LAYOUT =====
            y += 8;
            doc.setFontSize(9);
            const col1 = m;
            const col2 = pw / 2 + 5;
            const labelW = 22;

            // Row 1: Xe + Tài xế
            doc.setDrawColor(230,230,230);
            doc.setFillColor(245,247,250);
            doc.roundedRect(col1, y - 3, pw/2 - m - 3, 14, 2, 2, 'F');
            doc.roundedRect(col2, y - 3, pw/2 - m - 3, 14, 2, 2, 'F');

            gray(100,100,100);
            doc.setFontSize(7.5);
            doc.text('XE', col1 + 3, y + 1);
            doc.text('TÀI XẾ', col2 + 3, y + 1);
            gray(0,0,0);
            doc.setFontSize(10);
            bold(`${data.vehicleName || 'N/A'}  ${data.vehiclePlate || ''}`, col1 + 3, y + 7);
            bold(`${data.driverName || 'N/A'}${driverMobile ? '  📞 ' + driverMobile : ''}`, col2 + 3, y + 7);

            // Row 2: Người yêu cầu + Phòng ban
            y += 18;
            gray(100,100,100);
            doc.setFontSize(8);
            doc.text('Người yêu cầu:', col1, y);
            doc.text('Phòng ban:', col2, y);
            gray(0,0,0);
            doc.setFontSize(9);
            doc.text(`${data.requesterName || 'N/A'}  •  ${data.requesterPhone || ''}`, col1 + labelW + 5, y);
            doc.text(`${data.requesterDept || 'N/A'}`, col2 + labelW, y);

            // Row 3: Thời gian
            y += 7;
            gray(100,100,100);
            doc.setFontSize(8);
            doc.text('Thời gian:', col1, y);
            gray(0,0,0);
            doc.setFontSize(9);
            doc.text(`${fmtTime(startTime)} ${fmtDate(startTime)}  →  ${fmtTime(endTime)} ${fmtDate(endTime)}   •   ${data.passengerCount || 1} người`, col1 + labelW + 5, y);

            // Row 4: Mục đích
            y += 7;
            gray(100,100,100);
            doc.setFontSize(8);
            doc.text('Mục đích:', col1, y);
            gray(0,0,0);
            doc.setFontSize(9);
            const purposeLines = doc.splitTextToSize(data.purpose || 'N/A', pw - 2*m - labelW - 5);
            doc.text(purposeLines, col1 + labelW + 5, y);
            y += Math.max(0, (purposeLines.length - 1) * 4);

            // Row 5: Lộ trình (Điểm đón → Điểm đến)
            y += 7;
            gray(100,100,100);
            doc.setFontSize(8);
            doc.text('Lộ trình:', col1, y);
            gray(0,0,0);
            doc.setFontSize(9);
            const pickup = data.pickup || (data.route ? data.route.split('→')[0]?.trim() : 'N/A');
            const dest = data.destination || (data.route ? data.route.split('→').slice(1).join('→').trim() : 'N/A');
            doc.text(`${pickup}  →  ${dest}`, col1 + labelW + 5, y);

            // Ghi chú (nếu có)
            if (data.otherRequests) {
                y += 6;
                gray(100,100,100);
                doc.setFontSize(8);
                doc.text('Ghi chú:', col1, y);
                gray(0,0,0);
                doc.setFontSize(9);
                doc.text(data.otherRequests.substring(0, 80), col1 + labelW + 5, y);
            }

            // Ghép chuyến (nếu có)
            if (data.isGrouped) {
                y += 8;
                doc.setFillColor(255,251,235);
                doc.setDrawColor(252,211,77);
                doc.roundedRect(col1, y - 3, pw - 2*m, 10, 2, 2, 'FD');
                doc.setFontSize(8);
                gray(120,80,0);
                doc.text(`🔗 Ghép chuyến: Mã ${(data.tripId||'').substring(0,8)} | Đón thứ ${data.groupOrder||1}/${data.groupTotalRequests||1} | Tổng ${data.groupTotalPassengers||data.passengerCount} người${data.groupNote ? ' | '+data.groupNote : ''}`, col1 + 3, y + 3);
            }

            // ===== APPROVAL LINE =====
            y = ph - 42;
            doc.setDrawColor(220,220,220);
            doc.setLineWidth(0.3);
            doc.line(m, y, pw - m, y);
            y += 4;
            doc.setFontSize(7);
            gray(150,150,150);
            let approvalText = 'Phê duyệt: ';
            if (data.managerApprovedByName) approvalText += `LĐ Phòng: ${data.managerApprovedByName}  |  `;
            if (data.dispatchedByName || data.officeApprovedByName) approvalText += `QL Điều xe: ${data.dispatchedByName || data.officeApprovedByName}  |  `;
            if (data.companyApprovedByName) approvalText += `LĐ PTQLKCN: ${data.companyApprovedByName}`;
            doc.text(approvalText, m, y);

            // ===== SIGNATURES (3 columns) =====
            y = ph - 32;
            gray(0,0,0);
            doc.setFontSize(8);
            const sig1 = m + 20;
            const sig2 = pw / 2;
            const sig3 = pw - m - 20;

            bold('NGƯỜI YÊU CẦU', sig1, y, { align: 'center' });
            bold('TÀI XẾ', sig2, y, { align: 'center' });
            bold('QL ĐIỀU XE', sig3, y, { align: 'center' });

            doc.setFontSize(7);

                            <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>

        // ==================== TÍNH NĂNG GHÉP CHUYẾN ====================

        // Hàm phân tích và gợi ý các yêu cầu có thể ghép chuyến
        // ========== GỢI Ý GHÉP CHUYẾN AI (CẢI TIẾN) ==========
        // Hệ thống điểm: Thời gian (40%) + Địa điểm (40%) + Số người (20%)
        const GROUPING_WEIGHTS = {
            time: 0.4,
            location: 0.4,
            passengers: 0.2
        };

        function analyzeGroupableRequests(requests) {
            const groups = [];
            const used = new Set();

            // Sắp xếp theo thời gian bắt đầu
            const sorted = [...requests].sort((a, b) =>
                a.data().startTime.toDate() - b.data().startTime.toDate()
            );

            for (let i = 0; i < sorted.length; i++) {
                if (used.has(sorted[i].id)) continue;

                const req1 = sorted[i].data();
                const group = {
                    requests: [{ doc: sorted[i], matchScore: 100 }], // Yêu cầu gốc có score 100%
                    totalPassengers: req1.passengerCount,
                    startTime: req1.startTime.toDate(),
                    endTime: req1.endTime.toDate(),
                    routes: [req1.route],
                    avgMatchScore: 100
                };

                // Tìm các yêu cầu có thể ghép
                for (let j = i + 1; j < sorted.length; j++) {
                    if (used.has(sorted[j].id)) continue;

                    const req2 = sorted[j].data();
                    const time2Start = req2.startTime.toDate();
                    const time2End = req2.endTime.toDate();

                    // Tính điểm khớp
                    const matchScore = calculateMatchScore(req1, req2, group.startTime);

                    // Chỉ ghép nếu điểm >= 50%
                    if (matchScore >= 50) {
                        group.requests.push({ doc: sorted[j], matchScore: matchScore });
                        group.totalPassengers += req2.passengerCount;
                        group.routes.push(req2.route);
                        // Mở rộng khung giờ
                        if (time2Start < group.startTime) group.startTime = time2Start;
                        if (time2End > group.endTime) group.endTime = time2End;
                    }
                }

                // Chỉ thêm vào gợi ý nếu có >= 2 yêu cầu có thể ghép
                if (group.requests.length >= 2) {
                    // Tính điểm trung bình
                    group.avgMatchScore = Math.round(
                        group.requests.reduce((sum, r) => sum + r.matchScore, 0) / group.requests.length
                    );
                    group.requests.forEach(r => used.add(r.doc.id));
                    groups.push(group);
                }
            }

            // Sắp xếp nhóm theo điểm trung bình giảm dần
            return groups.sort((a, b) => b.avgMatchScore - a.avgMatchScore);
        }

        // Tính điểm khớp giữa 2 yêu cầu
        function calculateMatchScore(req1, req2, groupStartTime) {
            let score = 0;

            // 1. Điểm thời gian (40%): Gần nhau = điểm cao
            const time1 = req1.startTime.toDate();
            const time2 = req2.startTime.toDate();
            const timeDiff = Math.abs(groupStartTime - time2) / (1000 * 60); // Phút

            if (timeDiff <= 15) {
                score += GROUPING_WEIGHTS.time * 100; // 100% nếu <= 15 phút
            } else if (timeDiff <= 30) {
                score += GROUPING_WEIGHTS.time * 80; // 80% nếu <= 30 phút
            } else if (timeDiff <= 60) {
                score += GROUPING_WEIGHTS.time * 50; // 50% nếu <= 60 phút
            } else if (timeDiff <= 90) {
                score += GROUPING_WEIGHTS.time * 30; // 30% nếu <= 90 phút
            }
            // Quá 90 phút không được điểm thời gian

            // 2. Điểm địa điểm (40%): Nhiều từ khóa chung = điểm cao
            const routeScore = calculateRouteSimilarityScore(req1.route, req2.route);
            score += GROUPING_WEIGHTS.location * routeScore;

            // 3. Điểm số người (20%): Tổng số người hợp lý = điểm cao
            const totalPassengers = req1.passengerCount + req2.passengerCount;
            if (totalPassengers <= 4) {
                score += GROUPING_WEIGHTS.passengers * 100; // Vừa xe 4 chỗ
            } else if (totalPassengers <= 7) {
                score += GROUPING_WEIGHTS.passengers * 90; // Vừa xe 7 chỗ
            } else if (totalPassengers <= 16) {
                score += GROUPING_WEIGHTS.passengers * 70; // Vừa xe 16 chỗ
            } else if (totalPassengers <= 29) {
                score += GROUPING_WEIGHTS.passengers * 50; // Vừa xe 29 chỗ
            } else {
                score += GROUPING_WEIGHTS.passengers * 20; // Quá nhiều
            }

            return Math.round(score);
        }

        // Tính điểm tương đồng lộ trình (0-100)
        function calculateRouteSimilarityScore(route1, route2) {
            const keywords1 = extractLocationKeywords(route1);
            const keywords2 = extractLocationKeywords(route2);

            if (keywords1.length === 0 && keywords2.length === 0) {
                // Nếu không có từ khóa, so sánh trực tiếp text
                return route1.toLowerCase().includes(route2.substring(0, 10).toLowerCase()) ||
                       route2.toLowerCase().includes(route1.substring(0, 10).toLowerCase()) ? 50 : 0;
            }

            // Tìm số từ khóa chung
            const common = keywords1.filter(k => keywords2.includes(k));
            const totalUnique = new Set([...keywords1, ...keywords2]).size;

            if (totalUnique === 0) return 0;
            return Math.round((common.length / totalUnique) * 100);
        }

        // Kiểm tra độ tương đồng lộ trình (boolean - dùng cho backward compatibility)
        function checkRouteSimilarity(route1, route2) {
            return calculateRouteSimilarityScore(route1, route2) >= 30;
        }

        // Render gợi ý ghép chuyến (CẢI TIẾN: hiển thị % khớp)
        // Giới hạn tối đa 3 nhóm và chỉ hiển thị nhóm có độ khớp >= 60%

        // Xử lý ghép chuyến và cập nhật database

        // Hàm lấy badge HTML cho mức độ ưu tiên
        function getPriorityBadge(priority) {
            if (!priority || priority === 'normal') return '';

            const badgeConfig = {
                'urgent': {
                    class: 'bg-orange-100 text-orange-800 border-orange-300',
                    icon: '⚡',
                    text: 'Khẩn'
                },
                'very_urgent': {
                    class: 'bg-red-100 text-red-800 border-red-300',
                    icon: '🔥',
                    text: 'Rất khẩn'
                }
            };

            const config = badgeConfig[priority];
            if (!config) return '';

            return `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium ${config.class} border ml-2">${config.icon} ${config.text}</span>`;
        }

        // Hàm lấy giá trị số để sắp xếp theo ưu tiên (số nhỏ = ưu tiên cao)
        function getPriorityOrder(priority) {
            const orderMap = {
                'very_urgent': 1,
                'urgent': 2,
                'normal': 3
            };
            return orderMap[priority] || 3;
        }

        // Hàm sắp xếp danh sách yêu cầu theo ưu tiên (cao nhất trước), sau đó theo thời gian bắt đầu
        function sortRequestsByPriority(docs) {
            return [...docs].sort((a, b) => {
                const dataA = a.data();
                const dataB = b.data();

                // Sắp xếp theo priority trước
                const priorityDiff = getPriorityOrder(dataA.priority) - getPriorityOrder(dataB.priority);
                if (priorityDiff !== 0) return priorityDiff;

                // Nếu cùng priority, sắp xếp theo startTime (sớm nhất trước)
                return dataA.startTime.toDate() - dataB.startTime.toDate();
            });
        }

        // ========== HỆ THỐNG THÔNG BÁO TOAST ==========
        const toastContainer = document.getElementById('toast-container');
        const shownReminders = new Set(); // Lưu trữ ID đã nhắc để không lặp lại

        const _recentToastKeys = new Set();
        function showToast(type, title, message, duration = 8000, onClick = null) {
            // Dedup: tránh toast trùng trong 10 giây
            const toastKey = `${title}-${message}`.substring(0, 80);
            if (_recentToastKeys.has(toastKey)) return;
            _recentToastKeys.add(toastKey);
            setTimeout(() => _recentToastKeys.delete(toastKey), 10000);

            const toast = document.createElement('div');
            toast.className = `toast toast-${type} relative`;

            const icons = {
                'warning': '⏰',
                'info': 'ℹ️',
                'urgent': '🔥',
                'success': '✅'
            };

            toast.innerHTML = `
                <div class="toast-icon">${icons[type] || '📢'}</div>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    <div class="toast-message">${message}</div>
                </div>
                <button class="toast-close">&times;</button>
            `;

            // Đóng toast khi click nút close
            toast.querySelector('.toast-close').addEventListener('click', (e) => {
                e.stopPropagation();
                closeToast(toast);
            });

            // Click vào toast để thực hiện action
            if (onClick) {
                toast.addEventListener('click', () => {
                    onClick();
                    closeToast(toast);
                });
            }

            toastContainer.appendChild(toast);

            // Tự động đóng sau duration
            if (duration > 0) {
                setTimeout(() => closeToast(toast), duration);
            }

            return toast;
        }

        function closeToast(toast) {
            if (!toast || !toast.parentNode) return;
            toast.style.animation = 'slideOut 0.3s ease-out forwards';
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.parentNode.removeChild(toast);
                }
            }, 300);
        }

        // ========== NHẮC NHỞ TỰ ĐỘNG ==========
        async function checkPendingReminders() {
            if (!currentUserId || !currentUserRole) return;

            const now = new Date();

            try {
                // 1. Nhắc người phê duyệt về các yêu cầu chờ > 2 giờ
                if (['manager', 'company_leader', 'office_leader'].includes(currentUserRole)) {
                    await checkApprovalReminders(now);
                }

                // 2. Nhắc tài xế 30 phút trước giờ xuất phát
                if (currentUserRole === 'driver') {
                    await checkDriverReminders(now);
                }

                // 3. Nhắc người yêu cầu về các yêu cầu khẩn chưa được duyệt
                await checkUrgentRequestReminders(now);

                // 4. Nhắc bảo trì xe sắp đến hạn/quá hạn
                await checkMaintenanceReminders();

            } catch (error) {
                console.error('Lỗi kiểm tra nhắc nhở:', error);
            }
        }

        async function checkApprovalReminders(now) {
            const twoHoursAgo = new Date(now.getTime() - 2 * 60 * 60 * 1000);

            let statusToCheck;
            let roleLabel;

            if (currentUserRole === 'manager') {
                statusToCheck = 'pending_manager_approval';
                roleLabel = 'LĐ Phòng';
            } else if (currentUserRole === 'company_leader') {
                statusToCheck = 'pending_company_approval';
                roleLabel = 'LĐ PTQLKCN';
            } else if (currentUserRole === 'office_leader') {
                statusToCheck = 'pending_dispatch';
                roleLabel = 'QL Điều xe';
            }

            if (!statusToCheck) return;

            const q = query(
                collection(db, REQUESTS_COLLECTION),
                where("status", "==", statusToCheck),
                orderBy("createdAt", "asc")
            );

            const snapshot = await getDocs(q);
            let pendingCount = 0;
            let urgentCount = 0;

            snapshot.docs.forEach(doc => {
                const data = doc.data();
                const createdAt = data.createdAt.toDate();
                const waitTime = now - createdAt;

                // Chỉ nhắc nếu chờ > 2 giờ và chưa nhắc
                if (waitTime > 2 * 60 * 60 * 1000) {
                    pendingCount++;
                    if (data.priority === 'urgent' || data.priority === 'very_urgent') {
                        urgentCount++;
                    }
                }
            });

            if (pendingCount > 0) {
                const reminderKey = `approval-${currentUserRole}-${now.toDateString()}`;
                if (!shownReminders.has(reminderKey)) {
                    shownReminders.add(reminderKey);

                    const type = urgentCount > 0 ? 'urgent' : 'warning';
                    const title = urgentCount > 0 ? `${urgentCount} yêu cầu KHẨN cần duyệt!` : 'Có yêu cầu chờ duyệt';
                    const message = `Bạn có ${pendingCount} yêu cầu đang chờ phê duyệt quá 2 giờ.`;

                    showToast(type, title, message, 15000);
                }
            }
        }

        async function checkDriverReminders(now) {
            const thirtyMinutesLater = new Date(now.getTime() + 30 * 60 * 1000);

            const q = query(
                collection(db, REQUESTS_COLLECTION),
                where("driverId", "==", currentUserId),
                where("status", "==", "assigned")
            );

            const snapshot = await getDocs(q);

            // Gộp thông báo - chỉ hiện 1 toast tổng hợp
            let upcomingTrips = [];

            snapshot.docs.forEach(doc => {
                const data = doc.data();
                const startTime = data.startTime.toDate();
                const timeDiff = startTime - now;

                // Nhắc nếu còn dưới 30 phút
                if (timeDiff > 0 && timeDiff <= 30 * 60 * 1000) {
                    upcomingTrips.push({
                        id: doc.id,
                        requesterName: data.requesterName,
                        minutes: Math.round(timeDiff / 60000)
                    });
                }
            });

            // Chỉ hiện 1 toast nếu có chuyến sắp đến
            if (upcomingTrips.length > 0) {
                const reminderKey = `driver-summary-${now.toDateString()}-${now.getHours()}`;
                if (!shownReminders.has(reminderKey)) {
                    shownReminders.add(reminderKey);

                    const message = upcomingTrips.length === 1
                        ? `Chuyến "${upcomingTrips[0].requesterName}" bắt đầu sau ${upcomingTrips[0].minutes} phút.`
                        : `Có ${upcomingTrips.length} chuyến sắp bắt đầu trong 30 phút tới.`;

                    showToast('warning', '🚗 Sắp đến giờ đón khách!', message, 0);
                }
            }
        }

        async function checkUrgentRequestReminders(now) {
            // Chỉ kiểm tra cho người đã gửi yêu cầu
            const q = query(
                collection(db, REQUESTS_COLLECTION),
                where("requesterId", "==", currentUserId),

        // Chạy kiểm tra nhắc nhở định kỳ mỗi 5 phút
        // ĐÃ TẮT: Không hiển thị toast nhắc nhở tự động
        let reminderInterval = null;
        function startReminderChecker() {
            // DISABLED: Tắt toast nhắc nhở tự động theo yêu cầu
            return;

            // Kiểm tra ngay khi khởi động (sau 3 giây để đảm bảo UI đã load)
            // setTimeout(checkPendingReminders, 3000);

            // Sau đó kiểm tra mỗi 5 phút
            // reminderInterval = setInterval(checkPendingReminders, 5 * 60 * 1000);
        }

        function stopReminderChecker() {
            if (reminderInterval) {
                clearInterval(reminderInterval);
                reminderInterval = null;
            }
        }

        // ========== THÔNG BÁO REAL-TIME ==========
        const notifiedChanges = new Set(); // Theo dõi các thay đổi đã thông báo
        let isFirstLoad = true; // Flag để tránh thông báo khi load lần đầu
        const NOTIFICATION_SOUND_ENABLED = true; // Có thể tắt âm thanh

        // Âm thanh thông báo (sử dụng Web Audio API)
        function playNotificationSound() {
            if (!NOTIFICATION_SOUND_ENABLED) return;

            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.frequency.value = 800;
                oscillator.type = 'sine';
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);

                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.3);
            } catch (e) {
                // Silent fail - không cần log
            }
        }

        // Hàm kiểm tra và hiển thị thông báo cho các thay đổi trạng thái
        function checkAndNotifyStatusChange(docId, oldData, newData) {
            // Tránh thông báo trùng lặp - key = docId + newStatus (không dùng timestamp)
            const changeKey = `${docId}-${newData.status}`;
            if (notifiedChanges.has(changeKey)) return;
            notifiedChanges.add(changeKey);

            // Giới hạn số lượng key để tránh memory leak
            if (notifiedChanges.size > 1000) {
                const iterator = notifiedChanges.values();
                for (let i = 0; i < 500; i++) {
                    notifiedChanges.delete(iterator.next().value);
                }
            }

            const oldStatus = oldData?.status;
            const newStatus = newData.status;

            // Không thông báo nếu trạng thái không đổi
            if (oldStatus === newStatus) return;

            // Xác định loại thông báo dựa trên vai trò và trạng thái
            let shouldNotify = false;
            let notifyType = 'info';
            let notifyTitle = '';
            let notifyMessage = '';

            // 1. Thông báo cho người yêu cầu khi được duyệt/từ chối
            if (newData.requesterId === currentUserId) {
                if (newStatus === 'pending_dispatch' && oldStatus === 'pending_manager_approval') {
                    shouldNotify = true;
                    notifyType = 'success';
                    notifyTitle = '✅ Đã được LĐ Phòng duyệt';
                    notifyMessage = `Yêu cầu "${newData.purpose.substring(0, 30)}..." đã được LĐ Phòng duyệt. Chờ điều xe.`;
                }
                else if (newStatus === 'pending_company_approval' && oldStatus === 'pending_dispatch') {
                    shouldNotify = true;
                    notifyType = 'success';
                    notifyTitle = '✅ Đã được điều xe';
                    notifyMessage = `Yêu cầu "${newData.purpose.substring(0, 30)}..." đã có xe. Chờ LĐ PTQLKCN duyệt.`;
                }
                else if (newStatus === 'assigned') {
                    shouldNotify = true;
                    notifyType = 'success';
                    notifyTitle = '🚗 Đã được phân xe!';
                    notifyMessage = `Xe: ${newData.vehicleName || 'N/A'}, Tài xế: ${newData.driverName || 'N/A'}`;
                }
                else if (newStatus === 'rejected') {
                    shouldNotify = true;
                    notifyType = 'urgent';
                    notifyTitle = '❌ Yêu cầu bị từ chối';
                    notifyMessage = `Lý do: ${newData.rejectionReason || 'Không có lý do'}`;
                }
            }

            // 2. Thông báo cho tài xế khi được phân công
            if (newData.driverId === currentUserId && newStatus === 'assigned' && oldStatus !== 'assigned') {
                shouldNotify = true;
                notifyType = 'info';
                notifyTitle = '📋 Có chuyến mới được phân công!';
                notifyMessage = `${newData.requesterName} - ${newData.startTime.toDate().toLocaleString('vi-VN')}`;
            }

            // 3. Thông báo cho người duyệt khi có yêu cầu mới cần xử lý
            if (currentUserRole === 'manager' && newStatus === 'pending_manager_approval' && !oldStatus) {
                shouldNotify = true;
                notifyType = 'warning';
                notifyTitle = '📥 Có yêu cầu mới cần duyệt';
                notifyMessage = `${newData.requesterName}`;
            }
            else if (currentUserRole === 'office_leader' && newStatus === 'pending_dispatch' && oldStatus === 'pending_manager_approval') {
                shouldNotify = true;
                notifyType = 'warning';
                notifyTitle = '📥 Có yêu cầu mới cần điều xe';
                notifyMessage = `${newData.requesterName} - ${newData.startTime.toDate().toLocaleString('vi-VN')}`;
            }
            else if (currentUserRole === 'company_leader' && newStatus === 'pending_company_approval' && oldStatus === 'pending_dispatch') {
                shouldNotify = true;
                notifyType = 'warning';
                notifyTitle = '📥 Có yêu cầu xe cần LĐ PTQLKCN duyệt';
                notifyMessage = `${newData.requesterName} - Xe: ${newData.vehicleName || 'N/A'}`;
            }

            // Hiển thị thông báo
            if (shouldNotify) {
                playNotificationSound();
                showToast(notifyType, notifyTitle, notifyMessage, 10000, () => showRequestDetails(docId));
            }
        }

        // Hàm khởi tạo real-time notification listener
        let realtimeUnsubscribe = null;

        function startRealtimeNotifications() {
            if (realtimeUnsubscribe) {
                realtimeUnsubscribe();
            }

            // Cache dữ liệu cũ để so sánh
            const previousData = new Map();

            // Lắng nghe tất cả các requests liên quan đến user hiện tại
            const q = query(collection(db, REQUESTS_COLLECTION));

            realtimeUnsubscribe = onSnapshot(q, (snapshot) => {
                snapshot.docChanges().forEach(change => {
                    const docId = change.doc.id;
                    const newData = change.doc.data();

                    // Bỏ qua lần load đầu tiên
                    if (isFirstLoad) {
                        previousData.set(docId, newData);
                        return;
                    }

                    if (change.type === 'modified') {
                        const oldData = previousData.get(docId);
                        // Chỉ notify nếu status thực sự thay đổi
                        if (oldData && oldData.status !== newData.status) {
                            checkAndNotifyStatusChange(docId, oldData, newData);
                        }
                        previousData.set(docId, newData);
                    } else if (change.type === 'added') {
                        previousData.set(docId, newData);
                    }
                });

                // Đánh dấu đã load xong
                if (isFirstLoad) {
                    setTimeout(() => { isFirstLoad = false; }, 5000);
                }
            }, (error) => {
                console.error('Lỗi real-time notification:', error);
            });
        }

        function stopRealtimeNotifications() {
            if (realtimeUnsubscribe) {
                realtimeUnsubscribe();
                realtimeUnsubscribe = null;
            }
        }

        // ========== FIREBASE CLOUD MESSAGING (FCM) - GIỐNG baocaothongminh ==========
        let fcmToken = null;

        /**
         * Khởi tạo FCM - DÙNG COMPAT SDK (giống baocaothongminh)
         * KHÔNG đăng ký service worker thủ công, KHÔNG truyền serviceWorkerRegistration
         */
        async function initializeFCM(userId) {
            try {
                // Kiểm tra browser hỗ trợ
                if (!('Notification' in window)) {
                    console.warn('Browser không hỗ trợ Notification');
                    return;
                }

                // Xin quyền thông báo
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') {
                    return;
                }

                // Dùng Compat SDK giống baocaothongminh
                if (VAPID_KEY && messagingCompat) {
                    // Lấy FCM token - KHÔNG truyền serviceWorkerRegistration
                    fcmToken = await messagingCompat.getToken({
                        vapidKey: VAPID_KEY
                    });

                    if (fcmToken) {
                        // Lưu token vào Firestore
                        await saveFCMToken(userId, fcmToken);
                    }

                    // Xử lý thông báo khi app đang mở (foreground)
                    messagingCompat.onMessage((payload) => {
                        handleForegroundMessage(payload);
                    });
                }

            } catch (error) {
                console.error('🔔 FCM init error:', error.message);
            }
        }

        /**
         * Lưu FCM token vào Firestore
         */
        async function saveFCMToken(userId, token) {
            if (!userId || !token) {
                console.error('saveFCMToken: userId hoặc token trống', { userId, token: token ? 'có' : 'không' });
                return;
            }

            try {
                const tokenRef = doc(db, 'fcm_tokens', userId);

                // Kiểm tra document đã tồn tại chưa
                const tokenDoc = await getDoc(tokenRef);

                if (tokenDoc.exists()) {
                    // Document đã có, thêm token vào mảng
                    const existingTokens = tokenDoc.data().tokens || [];
                    if (!existingTokens.includes(token)) {
                        existingTokens.push(token);
                    }
                    await setDoc(tokenRef, {
                        tokens: existingTokens,
                        updatedAt: serverTimestamp(),
                        platform: detectPlatform(),
                        userAgent: navigator.userAgent
                    }, { merge: true });
                } else {
                    // Document chưa có, tạo mới với mảng tokens
                    await setDoc(tokenRef, {
                        tokens: [token],
                        updatedAt: serverTimestamp(),
                        platform: detectPlatform(),
                        userAgent: navigator.userAgent
                    });
                }

            } catch (error) {
                console.error('Lỗi lưu FCM token:', error);
                showToast('error', 'Lỗi lưu FCM', error.message);
            }
        }

        /**
         * Xử lý thông báo khi app đang mở (foreground)
         * Hiển thị notification lên màn hình
         */
        function handleForegroundMessage(payload) {
            const title = payload.notification?.title || payload.data?.title || 'Thông báo mới';
            const body = payload.notification?.body || payload.data?.body || '';
            const icon = '/favicon-192.png';

            // Hiển thị System Notification
            if (Notification.permission === 'granted') {
                const notification = new Notification(title, {
                    body: body,
                    icon: icon,
                    badge: '/favicon-32.png',
                    tag: payload.data?.notificationId || 'foreground-' + Date.now(),
                    vibrate: [200, 100, 200],
                    requireInteraction: true
                });

                // Xử lý click vào notification
                notification.onclick = function(event) {
                    event.preventDefault();
                    window.focus();
                    notification.close();

                    // Nếu có relatedRequestId, mở chi tiết yêu cầu
                    if (payload.data?.relatedRequestId) {
                        showRequestDetails(payload.data.relatedRequestId);
                    }
                };
            }

            // Hiển thị Toast notification trong app
            playNotificationSound();
            showToast('info', title, body, 10000);

            // Cập nhật lại danh sách thông báo trong chuông
            if (typeof subscribeToNotifications === 'function' && currentUserId) {
                subscribeToNotifications(currentUserId);
            }
        }

        /**
         * Phát hiện nền tảng thiết bị
         */
        function detectPlatform() {
            const ua = navigator.userAgent;
            if (/android/i.test(ua)) return 'android';
            if (/iPad|iPhone|iPod/.test(ua)) return 'ios';
            if (/Windows/.test(ua)) return 'windows';
            if (/Mac/.test(ua)) return 'macos';
            return 'web';
        }

        function applySelectedTemplate() {
            const select = document.getElementById('template-select');
            const selectedOption = select.options[select.selectedIndex];

            if (!selectedOption.value) return;

            try {
                const template = JSON.parse(selectedOption.dataset.template);

                // Apply template values to form
                if (template.purpose) {
                    document.getElementById('req-purpose').value = template.purpose;
                }
                if (template.pickup) {
                    document.getElementById('req-pickup').value = template.pickup;
                }
                if (template.destination) {
                    document.getElementById('req-destination').value = template.destination;
                } else if (template.route) {
                    // Backward compat: old templates with single route field
                    const parts = template.route.split('→').map(s => s.trim());
                    if (parts.length >= 2) {
                        document.getElementById('req-pickup').value = parts[0];
                        document.getElementById('req-destination').value = parts.slice(1).join(' → ');
                    } else {
                        document.getElementById('req-pickup').value = template.route;
                    }
                }
                if (template.passengerCount) {
                    document.getElementById('req-passengers').value = template.passengerCount;
                }
                if (template.otherRequests) {
                    document.getElementById('req-other').value = template.otherRequests;
                }

                showToast('success', 'Đã áp dụng mẫu', `Mẫu "${template.name}" đã được điền vào form.`, 3000);
            } catch (error) {
                console.error('Lỗi áp dụng mẫu:', error);
            }
        }

            const purpose = document.getElementById('req-purpose').value;
            const pickup = document.getElementById('req-pickup')?.value || '';
            const destination = document.getElementById('req-destination')?.value || '';
            const route = pickup && destination ? pickup + ' → ' + destination : pickup || destination;
            const passengers = document.getElementById('req-passengers').value;
            const other = document.getElementById('req-other').value;

            if (!purpose && !route) {
                alert('Vui lòng điền ít nhất mục đích hoặc lộ trình để lưu mẫu!');
                return;
            }

            const templateName = prompt('Nhập tên cho mẫu này (VD: Đi công tác Đà Nẵng):');
            if (!templateName || !templateName.trim()) return;

            try {
                await addDoc(collection(db, TEMPLATES_COLLECTION), {
                    userId: currentUserId,
                    name: templateName.trim(),
                    purpose: purpose,
                    pickup: pickup,
                    destination: destination,
                    route: route,
                    passengerCount: parseInt(passengers) || 1,
                    otherRequests: other,
                    createdAt: Timestamp.now()
                });

                showToast('success', 'Đã lưu mẫu', `Mẫu "${templateName}" đã được lưu thành công.`, 3000);

        async function initCalendarView(containerId) {

            if (!container) return;

            // Get filter values
            const viewMode = document.getElementById('calendar-view-mode')?.value || 'all';
            const statusFilter = document.getElementById('calendar-filter-status')?.value || 'active';

            // Destroy existing calendar
            if (calendarInstance) {
                calendarInstance.destroy();

            container.innerHTML = '<div class="loader"></div>';

            try {
                // Load requests based on filter
                let q;
                if (statusFilter === 'active') {
                    q = query(
                        collection(db, REQUESTS_COLLECTION),
                        where("status", "in", ["pending_manager_approval", "pending_company_approval", "pending_dispatch", "assigned", "picked_up", "in_progress"])
                    );
                } else if (statusFilter === 'assigned') {
                    q = query(
                        collection(db, REQUESTS_COLLECTION),
                        where("status", "==", "assigned")
                    );
                } else if (statusFilter === 'completed') {
                    q = query(
                        collection(db, REQUESTS_COLLECTION),
                        where("status", "in", ["completed", "completed_by_driver"])
                    );
                } else {
                    q = query(collection(db, REQUESTS_COLLECTION));

                const snapshot = await getDocs(q);

                    const data = doc.data();
                    const startTime = data.startTime.toDate();

                    let borderColor = '#4f46e5';

                        case 'pending_manager_approval':

                        case 'assigned':

                            borderColor = '#0054d4';
                            break;
                        case 'picked_up':
                        case 'in_progress':
                            backgroundColor = '#8b5cf6'; // purple
                            borderColor = '#7c3aed';
                            break;
                        case 'completed':
                        case 'completed_by_driver':
                            backgroundColor = '#9ca3af'; // gray
                            borderColor = '#6b7280';
                            break;

                        end: endTime,
                        backgroundColor: backgroundColor,

                        extendedProps: {
                            requestId: doc.id,
                            status: data.status,
                            requesterName: data.requesterName,
                            requesterDept: data.requesterDept,
                            vehicleName: data.vehicleName,
                            vehiclePlate: data.vehiclePlate,

                            priority: data.priority

                    headerToolbar: {

                        center: 'title',
                        right: 'dayGridMonth,timeGridWeek,timeGridDay,listWeek'
                    },
                    locale: 'vi',
                    buttonText: {
                        today: 'Hôm nay',
                        month: 'Tháng',
                        week: 'Tuần',
                        day: 'Ngày',
                        list: 'Danh sách'
                    },
                    firstDay: 1, // Monday
                    slotMinTime: '06:00:00',
                    slotMaxTime: '22:00:00',
                    allDaySlot: false,
                    nowIndicator: true,
                    eventTimeFormat: {

                        minute: '2-digit',
                        hour12: false

                    events: events,

                            Trạng thái: ${formatStatus(props.status)}

        function getStatusColor(status) {
            const colorMap = {
                'pending_manager_approval': 'bg-yellow-100 text-yellow-800',
                'pending_company_approval': 'bg-yellow-100 text-yellow-800',
                'pending_dispatch': 'bg-orange-100 text-orange-800',
                'assigned': 'bg-blue-100 text-blue-800',
                'picked_up': 'bg-cyan-100 text-cyan-800',
                'in_progress': 'bg-purple-100 text-purple-800',
                'completed_by_driver': 'bg-green-100 text-green-800',
                'completed': 'bg-gray-100 text-gray-800',
                'rejected': 'bg-red-100 text-red-800'
            };
            return colorMap[status] || 'bg-gray-100';
        }

        // ========== TỐI ƯU PHÂN XE TỰ ĐỘNG ==========

        // Scoring weights cho gợi ý xe
        const VEHICLE_SUGGESTION_WEIGHTS = {
            seatFit: 0.50,      // Phù hợp số ghế (50%)
            availability: 0.30, // Xe rảnh (30%)
            efficiency: 0.20   // Tiết kiệm (20%)
        };

        /**
         * Tính điểm phù hợp số ghế
         * @param {number} seats - Số ghế xe
         * @param {number} passengers - Số người cần chở
         * @returns {number} Score 0-100
         */
        function calculateSeatFitScore(seats, passengers) {
            if (seats < passengers) {
                return 0; // Xe không đủ chỗ
            }

            const diff = seats - passengers;

            if (diff === 0 || diff === 1) {
                return 100; // Hoàn hảo: vừa đủ hoặc dư 1 ghế
            } else if (diff <= 3) {
                return 85;  // Tốt: dư 2-3 ghế
            } else if (diff <= 5) {
                return 65;  // Khá: dư 4-5 ghế
            } else if (diff <= 8) {
                return 45;  // Chấp nhận được: dư 6-8 ghế
            } else {
                return 25;  // Xe quá lớn so với nhu cầu
            }
        }

        /**
         * Tính điểm hiệu quả (xe nhỏ hơn = tiết kiệm hơn)
         * @param {number} seats - Số ghế xe
         * @param {number} passengers - Số người cần chở
         * @param {number} maxSeats - Số ghế lớn nhất trong fleet
         * @returns {number} Score 0-100
         */
        function calculateEfficiencyScore(seats, passengers, maxSeats) {
            if (seats < passengers) {
                return 0;
            }

            // Xe nhỏ hơn phù hợp nhu cầu = hiệu quả hơn
            // Normalize theo maxSeats trong fleet
            const normalizedSize = seats / maxSeats;
            const efficiencyScore = (1 - normalizedSize) * 100;

            // Điều chỉnh: nếu xe vừa đủ chỗ, tăng điểm
            const fitBonus = seats <= passengers + 2 ? 20 : 0;

            return Math.min(100, efficiencyScore + fitBonus);
        }

        /**
         * Gợi ý xe tối ưu dựa trên yêu cầu
         * @param {Array} vehiclesList - Danh sách xe {id, data, hasConflict}
         * @param {number} passengerCount - Số người cần chở
         * @returns {Array} Danh sách xe đã sắp xếp theo điểm
         */
        function suggestOptimalVehicles(vehiclesList, passengerCount) {
            if (!vehiclesList || vehiclesList.length === 0) {
                return [];
            }

            // Tìm số ghế lớn nhất để tính efficiency
            const maxSeats = Math.max(...vehiclesList.map(v => v.data.seats || 4));

            // Tính điểm cho mỗi xe
            const scoredVehicles = vehiclesList.map(vehicle => {
                const seats = vehicle.data.seats || 4;

                // Tính các thành phần điểm
                const seatFitScore = calculateSeatFitScore(seats, passengerCount);
                const availabilityScore = vehicle.hasConflict ? 0 : 100;
                const efficiencyScore = calculateEfficiencyScore(seats, passengerCount, maxSeats);

                // Tổng điểm có trọng số
                const totalScore =
                    seatFitScore * VEHICLE_SUGGESTION_WEIGHTS.seatFit +
                    availabilityScore * VEHICLE_SUGGESTION_WEIGHTS.availability +
                    efficiencyScore * VEHICLE_SUGGESTION_WEIGHTS.efficiency;

                // Lý do gợi ý
                let reasons = [];
                if (seatFitScore >= 85) reasons.push(`Số ghế phù hợp (${seats} ghế)`);
                else if (seatFitScore > 0) reasons.push(`${seats} ghế (dư ${seats - passengerCount})`);
                else reasons.push(`Không đủ ghế (${seats}/${passengerCount})`);

                if (vehicle.hasConflict) {
                    reasons.push('Đang bận');
                } else {
                    reasons.push('Xe rảnh');
                }

                if (efficiencyScore >= 70) reasons.push('Tiết kiệm');

                return {
                    ...vehicle,
                    score: Math.round(totalScore),
                    seatFitScore,
                    availabilityScore,
                    efficiencyScore,
                    reasons,
                    isSuggested: totalScore >= 65 && !vehicle.hasConflict && seatFitScore > 0
                };
            });

            // Sắp xếp theo điểm giảm dần
            scoredVehicles.sort((a, b) => b.score - a.score);

            return scoredVehicles;
        }

        /**
         * Build HTML options cho dropdown xe với gợi ý
         * @param {Array} scoredVehicles - Danh sách xe đã tính điểm
         * @returns {string} HTML options
         */
        function buildVehicleOptionsWithSuggestions(scoredVehicles) {
            if (!scoredVehicles || scoredVehicles.length === 0) {
                return '<option value="">Không có xe nào</option>';
            }

            let html = '';
            let hasSuggested = false;

            // Phần xe được gợi ý (top scored, available)
            const suggestedVehicles = scoredVehicles.filter(v => v.isSuggested);
            const otherVehicles = scoredVehicles.filter(v => !v.isSuggested && !v.hasConflict);
            const busyVehicles = scoredVehicles.filter(v => v.hasConflict);

            if (suggestedVehicles.length > 0) {
                html += '<optgroup label="⭐ Xe gợi ý (Phù hợp nhất)">';
                suggestedVehicles.forEach(v => {
                    const reasonText = v.reasons.slice(0, 2).join(' • ');
                    html += `<option value="${v.id}" data-score="${v.score}" title="${reasonText}">⭐ ${v.data.name} - ${v.data.plate} [${v.score}%] (${v.data.seats} ghế${v.data.driverName ? ', TXế: ' + v.data.driverName : ''})</option>`;
                });
                html += '</optgroup>';
                hasSuggested = true;
            }

            // Phần xe khác có sẵn
            if (otherVehicles.length > 0) {
                html += `<optgroup label="${hasSuggested ? 'Xe khác' : 'Xe có sẵn'}">`;
                otherVehicles.forEach(v => {
                    html += `<option value="${v.id}" data-score="${v.score}">${v.data.name} - ${v.data.plate} [${v.score}%] (${v.data.seats} ghế${v.data.driverName ? ', TXế: ' + v.data.driverName : ''})</option>`;
                });
                html += '</optgroup>';
            }

            // Phần xe đang bận
            if (busyVehicles.length > 0) {
                html += '<optgroup label="Xe đang bận (Không khả dụng)">';
                busyVehicles.forEach(v => {
                    html += `<option value="${v.id}" disabled style="color: #999;">${v.data.name} - ${v.data.plate} (${v.data.seats} ghế) - Đang bận</option>`;
                });
                html += '</optgroup>';
            }

            return html;
        }

        /**

        /**
         * Tạo báo cáo nâng cao theo loại đã chọn
         */
        async function generateAdvancedReport() {
            const reportType = window._currentReportType || 'vehicle';
            const startDateInput = document.getElementById('report-start-date').value;
            const endDateInput = document.getElementById('report-end-date').value;
            const resultsContainer = document.getElementById('report-results');

            if (!startDateInput || !endDateInput) {
                alert('Vui lòng chọn ngày bắt đầu và ngày kết thúc!');
                return;
            }

            const startDate = new Date(startDateInput);
            startDate.setHours(0, 0, 0, 0);
            const endDate = new Date(endDateInput);
            endDate.setHours(23, 59, 59, 999);

            if (startDate > endDate) {
                alert('Ngày bắt đầu phải trước ngày kết thúc!');
                return;
            }

            resultsContainer.innerHTML = '<div class="loader"></div>';

            try {
                // Fetch all completed requests in range (including completed_by_driver)
                const completedQ = query(
                    collection(db, REQUESTS_COLLECTION),
                    where("status", "in", ["completed", "completed_by_driver"]),
                    where("createdAt", ">=", Timestamp.fromDate(startDate)),
                    where("createdAt", "<=", Timestamp.fromDate(endDate))
                );

                const snapshot = await getDocs(completedQ);

                if (snapshot.empty) {
                    resultsContainer.innerHTML = `
                        <p class="text-gray-500">Không có chuyến đi nào hoàn thành trong khoảng thời gian này.</p>
                    `;
                    return;
                }

                // Store report data globally
                window._reportData = {
                    docs: snapshot.docs,
                    startDate,
                    endDate
                };

                // Render based on report type
                switch (reportType) {
                    case 'dashboard':
                        await renderDashboardReport(snapshot.docs, startDate, endDate, resultsContainer);
                        break;
                    case 'vehicle':
                        await renderVehicleReport(snapshot.docs, startDate, endDate, resultsContainer);
                        break;
                    case 'driver':
                        await renderDriverReport(snapshot.docs, startDate, endDate, resultsContainer);
                        break;
                    case 'dept':
                        renderDepartmentReport(snapshot.docs, startDate, endDate, resultsContainer);
                        break;
                    case 'trend':
                        renderTrendReport(snapshot.docs, startDate, endDate, resultsContainer);
                        break;
                    default:
                        await renderDashboardReport(snapshot.docs, startDate, endDate, resultsContainer);
                }

                // Show export buttons
                document.getElementById('export-pdf-btn').style.display = 'block';
                document.getElementById('export-excel-btn').style.display = 'block';

            } catch (error) {
                console.error('Error generating advanced report:', error);
                resultsContainer.innerHTML = `<p class="text-red-500">Lỗi khi tạo báo cáo: ${error.message}</p>`;
            }
        }
