        // Kiểm tra quyền truy cập app - ƯU TIÊN Permissions API và appRolesCache
        async function checkDepartmentAccess(departmentId, userRole, userData = null) {
            // 0. ƯU TIÊN CAO NHẤT: Kiểm tra qua Permissions API
            if (isDieuxeGlobalAdmin() || canDieuxe('dieuxe:access')) {
                return true;
            }

            // 1. Kiểm tra appRolesCache từ Admin Roles
            // Nếu user được gán role qua appRolesCache (admin đã cấp quyền) → CHO PHÉP
            if (userData && userData.appRolesCache && userData.appRolesCache.dieuxe) {
                const dieuxeRoles = userData.appRolesCache.dieuxe.roles || [];
                if (dieuxeRoles.length > 0) {
                    return true;
                }
            }

            // 2. Các role đặc biệt được tự động cho phép (từ auto-detection)
            const allowedRoles = ['admin', 'office_leader', 'company_leader', 'manager', 'driver'];
            if (allowedRoles.includes(userRole)) {
                return true;
            }

            // 3. FALLBACK: Kiểm tra theo phòng ban (cho requester/nhân viên)
            try {
                const accessDoc = await getDoc(doc(db, 'appPermissions', 'dieuxe_department_access'));

                if (!accessDoc.exists()) {
                    // Chưa cấu hình → cho phép tất cả (default)
                    return true;
                }

                const accessData = accessDoc.data();

                // Nếu allowAll = true → cho phép tất cả
                if (accessData.allowAll === true) {
                    return true;
                }

                // Kiểm tra departmentId có trong danh sách được phép không
                const allowedDepts = accessData.departments || [];
                if (allowedDepts.length === 0) {
                    // Chưa chọn phòng ban nào → cho phép tất cả (default)
                    return true;
                }

                return allowedDepts.includes(departmentId);
            } catch (error) {
                console.error('Error checking department access:', error);
                // Lỗi → cho phép truy cập (fail-open)
                return true;
            }
        }

        // ==================== SINGLE-SESSION MANAGEMENT ====================
        let sessionListenerUnsubscribe = null;

        async function isSingleSessionEnabled() {
            try {
                const settingRef = doc(db, 'system_settings', 'auth');
                const settingDoc = await getDoc(settingRef);
                return settingDoc.exists() ? (settingDoc.data().singleSessionEnabled ?? true) : true;
            } catch (e) { return true; }
        }

        async function startSessionListener(userId) {
            if (!userId) return;
            const enabled = await isSingleSessionEnabled();
            if (!enabled) return;

            if (sessionListenerUnsubscribe) {
                sessionListenerUnsubscribe();
                sessionListenerUnsubscribe = null;
            }
            const storedToken = localStorage.getItem('sessionToken');
            if (!storedToken) return;

            const userSessionRef = doc(db, 'user_sessions', userId);
            sessionListenerUnsubscribe = onSnapshot(userSessionRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const currentToken = localStorage.getItem('sessionToken');
                    if (data.sessionToken && currentToken && data.sessionToken !== currentToken) {
                        console.log('Session invalidated - logged in from another device');
                        stopSessionListener();
                        forceLogout('Tài khoản đã đăng nhập từ thiết bị khác');
                    }
                }
            }, (error) => {
                console.error('Session listener error:', error);
            });
        }

        function stopSessionListener() {
            if (sessionListenerUnsubscribe) {
                sessionListenerUnsubscribe();
                sessionListenerUnsubscribe = null;
            }
        }

        function forceLogout(message) {
            stopSessionListener();
            ['currentUser', 'userRole', 'userDept', 'qtdn_user', 'sessionToken', 'authUid'].forEach(k => localStorage.removeItem(k));
            alert(message);
            window.location.href = '/';
        }

        // 1. Check session on page load - đọc từ QTDN
        async function checkSession() {
            const qtdnUser = getQTDNUser();

            if (!qtdnUser || !qtdnUser.uid) {
                // Không có session, quay về trang chính
                alert('Vui lòng đăng nhập từ trang chủ!');
                window.location.href = '/';
                return;
            }

            // Wait for Firebase Auth to be ready
            const firebaseUser = await new Promise((resolve) => {
                const timeout = setTimeout(() => {
                    console.warn('⚠️ Firebase auth timeout');
                    resolve(null);
                }, 5000);

                const unsubscribe = onAuthStateChanged(auth, (user) => {
                    clearTimeout(timeout);
                    unsubscribe();
                    resolve(user);
                });
            });

            if (!firebaseUser) {
                console.warn('⚠️ No Firebase auth session, redirecting to login');
                alert('Phiên đăng nhập hết hạn. Vui lòng đăng nhập lại!');
                window.location.href = '/';
                return;
            }

            try {
                // Lấy thông tin user từ categoryPersonnel (doc.id = qtdnUser.uid)
                const userRef = doc(db, USERS_COLLECTION, qtdnUser.uid);
                const userSnap = await getDoc(userRef);

                if (userSnap.exists()) {
                    const userData = userSnap.data();
                    currentUserId = qtdnUser.uid; // doc.id làm userId
                    currentUserName = userData.name || qtdnUser.name;
                    currentUserEmail = userData.email || qtdnUser.username;
                    currentUserMobile = userData.mobile || userData.phone || '';

                    // ===== LẤY THÔNG TIN CHỨC VỤ VÀ ĐƠN VỊ TỪ ASSIGNMENTS =====
                    let userLevel = 6; // Mặc định là nhân viên
                    let positionName = '';
                    currentUserDept = ''; // Mặc định trống

                    // 1. Ưu tiên lấy từ assignments array (cách app nhân sự lưu)
                    const primaryAssignment = userData.assignments && userData.assignments.length > 0
                        ? userData.assignments.find(a => a.isPrimary) || userData.assignments[0]
                        : null;

                    if (primaryAssignment) {
                        positionName = primaryAssignment.positionName || '';
                        // Lấy departmentName và departmentId từ assignments
                        currentUserDept = primaryAssignment.departmentName || '';
                        currentUserDeptId = primaryAssignment.departmentId || '';
                        const posId = primaryAssignment.positionId;
                        if (posId) {
                            try {
                                const posRef = doc(db, 'categoryPositions', posId);
                                const posSnap = await getDoc(posRef);
                                if (posSnap.exists()) {
                                    userLevel = parseInt(posSnap.data().level) || 6;
                                    if (!positionName) {
                                        positionName = posSnap.data().name || '';
                                    }
                                }
                            } catch (e) {
                                // Position lookup failed silently
                            }
                        }
                    }

                    // 2. Fallback: lấy từ field position trực tiếp (position ID)
                    if (!positionName) {
                        const positionId = userData.position || userData.positionId;
                        if (positionId) {
                            try {
                                const posRef = doc(db, 'categoryPositions', positionId);
                                const posSnap = await getDoc(posRef);
                                if (posSnap.exists()) {
                                    const posData = posSnap.data();
                                    userLevel = parseInt(posData.level) || 6;
                                    positionName = posData.name || '';
                                }
                            } catch (e) {
                                // Position lookup failed silently
                            }
                        }
                    }

                    // Map level sang dieuxeRole
                    // Level 1: admin
                    // Level 2-3: company_leader (duyệt cấp 2 - công ty)
                    // Level 4-5: manager (duyệt cấp 1 - phòng ban)
                    // Level 6: requester (người đăng ký)
                    // Đặc biệt: office_leader (Chánh văn phòng - duyệt cấp 3 + gán xe)
                    // Đặc biệt: driver (Tài xế)

                    const posLower = positionName.toLowerCase();

                    // KIỂM TRA ADMIN TRƯỚC TIÊN
                    // Admin được xác định qua: role='admin', username='admin', hoặc level=1
                    const userRole = userData.role || '';
                    const userName = (userData.username || currentUserEmail || '').toLowerCase();

                    // ========== XÁC ĐỊNH ROLE THEO THỨ TỰ ƯU TIÊN ==========
                    // 1. appRolesCache (từ Role Definitions - admin gán)
                    // 2. dieuxeRole override (field riêng trong categoryPersonnel)
                    // 3. Tự động theo position/level

                    const appRolesCache = userData.appRolesCache || {};
                    const dieuxeRoles = appRolesCache.dieuxe?.roles || [];

                    // 1. Kiểm tra appRolesCache trước (ưu tiên cao nhất)
                    if (dieuxeRoles.length > 0) {
                        currentUserAllRoles = [...dieuxeRoles]; // Lưu tất cả roles
                        // Lấy role ưu tiên cao nhất cho dashboard chính

                    }
                    // 2. Kiểm tra dieuxeRole override
                    else {
                        const dieuxeRoleOverride = userData.dieuxeRole || '';
                        if (dieuxeRoleOverride && ['admin', 'office_leader', 'company_leader', 'manager', 'driver', 'operator', 'requester'].includes(dieuxeRoleOverride)) {
                            currentUserRole = dieuxeRoleOverride;
                        }
                        // 3. Tự động theo position/level
                        else if (userRole === 'admin' || userName === 'admin' || userLevel === 1) {
                            currentUserRole = 'admin';
                        }
                        // Ưu tiên kiểm tra chức vụ đặc biệt
                        // Chánh văn phòng → office_leader (duyệt cấp 3 + gán xe/tài xế)
                        else if (posLower.includes('chánh văn phòng') || posLower.includes('chanh van phong') ||
                            posLower.includes('trưởng văn phòng') || posLower.includes('truong van phong') ||
                            posLower.includes('cvp') || posLower.includes('c.v.p') ||
                            posLower.includes('chanh vp') || posLower.includes('chánh vp') ||
                            posLower.includes('văn phòng') && posLower.includes('chánh') ||
                            posLower.includes('van phong') && posLower.includes('chanh')) {
                            currentUserRole = 'office_leader';
                        }
                        // Tài xế → driver
                        else if (posLower.includes('tài xế') || posLower.includes('tai xe') ||
                            posLower.includes('lái xe') || posLower.includes('lai xe') ||
                            posLower.includes('driver') || posLower.includes('lx')) {
                            currentUserRole = 'driver';

                        // Map theo level
                        else if (userLevel <= 3) {
                            currentUserRole = 'company_leader';
                        } else if (userLevel <= 5) {
                            currentUserRole = 'manager';
                        } else {
                            currentUserRole = 'requester';

                    }

                    // Kiểm tra quyền truy cập app - ưu tiên appRolesCache từ Admin Roles
                    // Sử dụng departmentId thay vì departmentName để so khớp với config

                    startRealtimeNotifications();

                    // Subscribe to notification bell
                    subscribeToNotifications(currentUserId);

                    // Khởi tạo FCM để nhận push notification
                    initializeFCM(currentUserId);

                    // Start session listener for single-session login
                    const authUid = localStorage.getItem('authUid') || qtdnUser.uid;
                    startSessionListener(authUid);

                } else {
                    // User không tồn tại trong categoryPersonnel
                    alert('Tài khoản không có quyền truy cập Điều Hành Xe!');
                    window.location.href = '/';

        // Initialize
        checkSession();

        // 2. Hàm lấy thông tin User và tính role từ level (Có cache để tăng tốc)
        async function fetchUserRole(uid) {
            try {
                // Kiểm tra cache trước
                const cached = userRoleCache[uid];
                if (cached && (Date.now() - cached.timestamp < CACHE_EXPIRY)) {
                    return cached.data;
                }

                // Lấy từ categoryPersonnel
                const docRef = doc(db, USERS_COLLECTION, uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const userData = docSnap.data();

                    // Tính role từ positionName (ưu tiên từ userData) hoặc từ categoryPositions
                    let userRole = 'requester';

                    // Lấy positionName: ưu tiên từ assignments[0] (primary), sau đó direct field
                    const primaryAssignment = userData.assignments && userData.assignments.length > 0
                        ? userData.assignments.find(a => a.isPrimary) || userData.assignments[0]
                        : null;
                    let positionName = primaryAssignment?.positionName || userData.positionName || '';

                    // HR app lưu position ID trong field "position" hoặc trong assignments
                    const positionId = primaryAssignment?.positionId || userData.positionId || userData.position;
                    let level = 6;

                    // KIỂM TRA DIEUXE ROLE OVERRIDE TRƯỚC
                    const dieuxeRoleOverride = userData.dieuxeRole || '';
                    const storedRole = userData.role || '';
                    const userName = (userData.username || userData.email || '').toLowerCase();

                    if (dieuxeRoleOverride && ['admin', 'office_leader', 'company_leader', 'manager', 'driver', 'operator', 'requester'].includes(dieuxeRoleOverride)) {
                        userRole = dieuxeRoleOverride;
                    } else if (storedRole === 'admin' || userName === 'admin') {
                        userRole = 'admin';
                    } else {
                        // Lấy level từ categoryPositions nếu có positionId
                        if (positionId) {
                            try {
                                const posRef = doc(db, 'categoryPositions', positionId);
                                const posSnap = await getDoc(posRef);
                                if (posSnap.exists()) {
                                    const posData = posSnap.data();
                                    level = parseInt(posData.level) || 6;
                                    // Nếu chưa có positionName từ userData, lấy từ categoryPositions
                                    if (!positionName) {
                                        positionName = posData.name || '';
                                    }
                                }
                            } catch (e) {
                                // Position lookup failed silently
                            }
                        }

                        // Map level sang role với ưu tiên chức vụ đặc biệt
                        const posLower = positionName.toLowerCase();

                        // Kiểm tra admin theo level trước
                        if (level === 1) {
                            userRole = 'admin';
                        }
                        // 1. Chánh văn phòng → office_leader (duyệt cấp 3 + gán xe/tài xế)
                        else if (posLower.includes('chánh văn phòng') || posLower.includes('chanh van phong') ||
                            posLower.includes('trưởng văn phòng') || posLower.includes('truong van phong') ||
                            posLower.includes('cvp') || posLower.includes('c.v.p') ||
                            posLower.includes('chanh vp') || posLower.includes('chánh vp') ||
                            posLower.includes('văn phòng') && posLower.includes('chánh') ||
                            posLower.includes('van phong') && posLower.includes('chanh')) {
                            userRole = 'office_leader';
                        }
                        // 2. Tài xế → driver
                        else if (posLower.includes('tài xế') || posLower.includes('tai xe') ||
                            posLower.includes('lái xe') || posLower.includes('lai xe') ||
                            posLower.includes('driver') || posLower.includes('lx')) {
                            userRole = 'driver';
                        }
                        // 3. Map theo level
                        else if (level <= 3) {
                            userRole = 'company_leader';
                        } else if (level <= 5) {
                            userRole = 'manager';
                        } else {
                            userRole = 'requester';
                        }
                    }

                    // Tạo object kết quả
                    const result = {
                        name: userData.name,
                        email: userData.email,
                        role: userRole,
                        dept: userData.department || userData.departmentId || '',
                        mobile: userData.mobile || userData.phone || '',
                        positionName: positionName
                    };

                    // Lưu vào cache
                    userRoleCache[uid] = {
                        data: result,
                        timestamp: Date.now()
                    };
                    return result;
                } else {
                    return null;
                }
            } catch (error) {
                console.error("Lỗi lấy thông tin user:", error);
                return null;
            }
        }

        // 3. Xử lý Logout - quay về trang chọn app
        logoutButton.addEventListener('click', () => {

        // changePasswordButton đã được xóa - đổi mật khẩu xử lý ở trang chính

        // Hàm login - Custom Authentication
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            loginError.innerText = "";
            setButtonLoading(loginSubmitBtn, true);

            try {
                // Hash the password
                const passwordHash = await hashPassword(password);

                // Query Firestore for user with matching email
                const usersRef = collection(db, USERS_COLLECTION);
                const q = query(usersRef, where("email", "==", email));
                const snapshot = await getDocs(q);

                if (snapshot.empty) {
                    throw new Error("Email hoặc mật khẩu không đúng");
                }

                // Check password
                let userDoc = null;
                let userId = null;
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.passwordHash === passwordHash) {
                        userDoc = data;
                        userId = doc.id;
                    }
                });

                if (!userDoc) {
                    throw new Error("Email hoặc mật khẩu không đúng");
                }

                // Save session
                saveSession(userId, userDoc);

                // Set current user variables
                currentUserId = userId;
                currentUserRole = userDoc.role;
                currentUserName = userDoc.name;
                currentUserEmail = userDoc.email;
                currentUserMobile = userDoc.mobile || '';

                // Lấy tên đơn vị, chức vụ và ID từ assignments (ưu tiên) hoặc fallback
                currentUserDept = '';
                currentUserDeptId = '';
                currentUserPosition = '';
                const altAssignment = userDoc.assignments && userDoc.assignments.length > 0
                    ? userDoc.assignments.find(a => a.isPrimary) || userDoc.assignments[0]
                    : null;
                if (altAssignment) {
                    currentUserDept = altAssignment.departmentName || '';
                    currentUserDeptId = altAssignment.departmentId || '';
                    currentUserPosition = altAssignment.positionName || '';
                }

                // Show app screen
                showAppScreen();
                renderDashboard();

                // Subscribe to notification bell
                subscribeToNotifications(currentUserId);

                // Khởi tạo FCM để nhận push notification
                initializeFCM(currentUserId);

            } catch (error) {
                console.error("Lỗi Đăng nhập:", error);
                loginError.innerText = error.message || "Đăng nhập thất bại";
            } finally {
                setButtonLoading(loginSubmitBtn, false);
            }
        }
        
        // 5. Quản lý Hiển thị
        function showAppScreen() {
            loginScreen.style.display = 'none';

            // Hiện chức vụ thực nếu có, fallback sang tên role
            // Nếu chưa có position, thử lấy từ Firestore
            if (!currentUserPosition && currentUserId) {
                getDoc(doc(db, USERS_COLLECTION, currentUserId)).then(snap => {
                    if (snap.exists()) {
                        const d = snap.data();
                        const a = d.assignments?.find(x => x.isPrimary) || d.assignments?.[0];
                        if (a?.positionName) {
                            currentUserPosition = a.positionName;
                            userRoleDisplay.innerText = currentUserPosition;
                        }
                    }
                }).catch(() => {});
            }

        // 7. Hàm dọn dẹp Listener
        function cleanupFirestoreListeners() {
            unsubscribeListeners.forEach(unsub => unsub());
            unsubscribeListeners = [];
        }
        
        // 8. Hàm lắng nghe mới (có quản lý)
        function addManagedListener(query, callback, errorCallback) {
            const unsub = onSnapshot(query, callback, errorCallback);
            unsubscribeListeners.push(unsub);
        }

        // SỬA LỖI: Thêm hàm setButtonLoading
        function setButtonLoading(button, isLoading) {
            const btnText = button.querySelector('.btn-text');
            if (isLoading) {
                button.disabled = true;
                if (btnText) btnText.classList.add('hidden'); // Ẩn text
                // Thêm spinner nếu chưa có
                if (!button.querySelector('.loader-small')) {
                    button.insertAdjacentHTML('afterbegin', '<span class="loader-small"></span>');
                }
            } else {
                button.disabled = false;
                if (btnText) btnText.classList.remove('hidden'); // Hiện text
                const loader = button.querySelector('.loader-small');
                if (loader) loader.remove();
            }
        }

        async function handleChangePassword(e) {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const errorEl = document.getElementById('change-password-error');
            errorEl.innerText = "";

            if (newPassword.length < 6) {
                errorEl.innerText = "Mật khẩu phải có ít nhất 6 ký tự.";

            try {
                // Hash the new password
                const newPasswordHash = await hashPassword(newPassword);

                // Update password in Firestore
                const userRef = doc(db, USERS_COLLECTION, currentUserId);
                await updateDoc(userRef, {
                    passwordHash: newPasswordHash,
                    updatedAt: Timestamp.now()
                });

                alert("Đổi mật khẩu thành công!");
                closeModal();
            } catch (error) {
                console.error("Lỗi đổi mật khẩu:", error);
                errorEl.innerText = "Đã xảy ra lỗi khi đổi mật khẩu. Vui lòng thử lại.";
            }
        }

        // Tải danh sách tài xế vào searchable dropdown (từ categoryPersonnel - dựa vào positionName)
        async function populateDriverDropdown(containerId, currentValue = '') {
            try {
                const drivers = await getDriversFromQTDN();

                const driverData = drivers.map(driver => ({
                    value: driver.id,
                    text: driver.name,
                    subtitle: driver.positionName || 'Tài xế'
                }));

                // Xác định container và hidden input
                let containerEl, hiddenInputId, selectInstance;

                if (containerId === 'vehicle-driver') {
                    containerEl = document.getElementById('vehicle-driver-container');
                    hiddenInputId = 'vehicle-driver';

                    if (!vehicleDriverSelect && containerEl) {
                        vehicleDriverSelect = SearchableSelect.create('vehicle-driver-container', {
                            placeholder: '-- Chưa gán tài xế --',
                            searchPlaceholder: '🔍 Tìm tài xế...',
                            allowClear: true,
                            onSelect: (value, text) => {
                                document.getElementById('vehicle-driver').value = value || '';
                            }
                        });
                    }
                    selectInstance = vehicleDriverSelect;

                } else if (containerId === 'edit-vehicle-driver') {
                    containerEl = document.getElementById('edit-vehicle-driver-container');
                    hiddenInputId = 'edit-vehicle-driver';

                    if (!editVehicleDriverSelect && containerEl) {
                        editVehicleDriverSelect = SearchableSelect.create('edit-vehicle-driver-container', {
                            placeholder: '-- Chưa gán tài xế --',
                            searchPlaceholder: '🔍 Tìm tài xế...',
                            allowClear: true,
                            onSelect: (value, text) => {
                                document.getElementById('edit-vehicle-driver').value = value || '';
                            }
                        });
                    }
                    selectInstance = editVehicleDriverSelect;
                }

                if (selectInstance) {
                    selectInstance.setData(driverData);
                    if (currentValue) {
                        selectInstance.setValue(currentValue);
                        document.getElementById(hiddenInputId).value = currentValue;
                    }
                }

            } catch (e) {
                console.error("Lỗi tải danh sách tài xế:", e);
            }
        }

        // Tải danh sách phòng ban từ categoryDepartments (app nhân sự) vào dropdown
        async function populateEmployeeGroupsDropdown(selectElementId, currentValue = '') {
            const selectEl = document.getElementById(selectElementId);
            if (!selectEl) return;

            try {
                const q = query(collection(db, 'categoryDepartments'), orderBy('name'));
                const snapshot = await getDocs(q);

                let options = '<option value="">-- Chọn phòng ban --</option>';

                snapshot.docs.forEach(doc => {
                    const dept = doc.data();
                    // Dùng doc.id (department ID) làm value để khớp với requesterDept
                    const selected = doc.id === currentValue ? 'selected' : '';
                    options += `<option value="${doc.id}" ${selected}>${dept.name || dept.tenPhongBan}</option>`;
                });

                selectEl.innerHTML = options;

            } catch (e) {
                console.error("Lỗi tải danh sách phòng ban:", e);
            }
        }

                    endHourSelect.value = newEndHour.toString().padStart(2, '0');
                }
            });

            document.getElementById('manage-templates-btn').addEventListener('click', showManageTemplatesModal);

            // Xử lý submit form
            document.getElementById('new-request-form').addEventListener('submit', async (e) => {
                e.preventDefault();

                // Lấy giá trị từ date + hour inputs
                const startDateValue = document.getElementById('req-start-date').value;
                const startHourValue = document.getElementById('req-start-hour').value;
                const endDateValue = document.getElementById('req-end-date').value;
                const endHourValue = document.getElementById('req-end-hour').value;

                const startTime = new Date(`${startDateValue}T${startHourValue}:00`);
                const endTime = new Date(`${endDateValue}T${endHourValue}:00`);

                // Validate datetime
                const now = new Date();

                // Check if start time is after current time (startTime must be > now)
                if (startTime <= now) {
                    alert("Thời gian bắt đầu phải sau thời điểm hiện tại!");
                    return;
                }

                // Check if end time is greater than start time
                if (endTime <= startTime) {
                    alert("Thời gian kết thúc phải sau thời gian bắt đầu!");
                    return;
                }

                const newRequest = {
                    requesterId: currentUserId,
                    requesterName: currentUserName, // Lấy từ biến toàn cục
                    requesterDept: currentUserDept || '', // Lấy từ biến toàn cục
                    requesterPhone: currentUserMobile || '', // Lấy từ biến toàn cục
                    purpose: document.getElementById('req-purpose').value,
                    startTime: Timestamp.fromDate(startTime),
                    endTime: Timestamp.fromDate(endTime),
                    pickup: document.getElementById('req-pickup').value,
                    destination: document.getElementById('req-destination').value,
                    route: document.getElementById('req-pickup').value + ' → ' + document.getElementById('req-destination').value,
                    passengerCount: parseInt(document.getElementById('req-passengers').value),
                    estimatedDistance: 0,
                    otherRequests: document.getElementById('req-other').value,
                    priority: document.getElementById('req-priority').value || 'normal', // Mức độ ưu tiên
                    status: 'pending_manager_approval', // Trạng thái đầu tiên
                    createdAt: Timestamp.now(),
                    history: [{
                        status: 'pending_manager_approval',
                        timestamp: Timestamp.now(),
                        actor: currentUserId,
                        actorName: currentUserName
                    }]
                };

                try {
                    const docRef = await addDoc(collection(db, REQUESTS_COLLECTION), newRequest);

                    // === TẠO THÔNG BÁO: Yêu cầu mới cho Manager ===
                    const managerIds = await getUserIdsByRole('manager', NOTIF_TYPES.NEW_REQUEST);

                    if (managerIds.length > 0) {
                        const startTimeDate = newRequest.startTime.toDate();
                        const destination = newRequest.route || newRequest.purpose || 'Chưa xác định';
                        await createNotification({
                            title: '📋 Yêu cầu xe mới cần duyệt',
                            content: `${newRequest.requesterName} yêu cầu xe đi "${destination}" vào ${startTimeDate.toLocaleDateString('vi-VN')} lúc ${startTimeDate.toLocaleTimeString('vi-VN', {hour: '2-digit', minute: '2-digit'})}.`,
                            type: NOTIF_TYPES.NEW_REQUEST,
                            priority: newRequest.priority === 'urgent' ? 'urgent' : 'normal',
                            targetType: 'user',
                            targetIds: managerIds,
                            relatedRequestId: docRef.id
                        });
                    }

                    closeModal();
                } catch (error) {
                    console.error("Lỗi tạo yêu cầu:", error);
                    alert("Đã xảy ra lỗi, vui lòng thử lại.");
                }
            });

        // Hiển thị Chi tiết Yêu cầu (Chung)
        async function showRequestDetails(requestId) {
            try {
                const docRef = doc(db, REQUESTS_COLLECTION, requestId);
                const docSnap = await getDoc(docRef);
                if (!docSnap.exists()) {
                    alert("Không tìm thấy yêu cầu!"); return;
                }
                
                const data = docSnap.data();

                // Lookup tên đơn vị nếu requesterDept là ID (không có dấu tiếng Việt, ~15 ký tự trở lên)
                if (data.requesterDept && data.requesterDept.length >= 15 && !/[àáạảãâầấậẩẫăằắặẳẵèéẹẻẽêềếệểễìíịỉĩòóọỏõôồốộổỗơờớợởỡùúụủũưừứựửữỳýỵỷỹđ\s]/i.test(data.requesterDept)) {
                    let deptName = null;

                    // Cách 1: Lấy từ categoryPersonnel của người yêu cầu (ưu tiên)
                    if (data.requesterId) {
                        try {
                            const requesterDoc = await getDoc(doc(db, USERS_COLLECTION, data.requesterId));
                            if (requesterDoc.exists()) {
                                const requesterData = requesterDoc.data();
                                const assignment = requesterData.assignments && requesterData.assignments.length > 0
                                    ? requesterData.assignments.find(a => a.isPrimary) || requesterData.assignments[0]
                                    : null;
                                if (assignment && assignment.departmentName) {
                                    deptName = assignment.departmentName;
                                }
                            }
                        } catch (e) {
                            console.warn('Không thể lấy departmentName từ requester:', e);
                        }
                    }

                    // Cách 2: Fallback lookup từ employeeGroups
                    if (!deptName) {
                        try {
                            const deptSnap = await getDoc(doc(db, 'employeeGroups', data.requesterDept));
                            if (deptSnap.exists()) {
                                deptName = deptSnap.data().name;
                            }
                        } catch (e) {
                            console.warn('Không thể lookup từ employeeGroups:', e);
                        }
                    }

                    if (deptName) {
                        data.requesterDept = deptName;
                    }
                }

                // Fetch driver's mobile if driver is assigned
                let driverMobile = '';
                if (data.driverId) {
                    try {
                        const driverDoc = await getDoc(doc(db, USERS_COLLECTION, data.driverId));
                        if (driverDoc.exists()) {
                            driverMobile = driverDoc.data().mobile || '';
                        }
                    } catch (error) {
                        console.error("Error fetching driver mobile:", error);
                    }
                }

                // office_leader có thể duyệt cấp 1 (như manager) cho NV Văn phòng
                const isOfficeLeaderActingAsManager = currentUserRole === 'office_leader' &&
                                                       data.status === 'pending_manager_approval' &&
                                                       data.requesterDept === currentUserDept;

                const isApprover = currentUserRole !== 'requester' && currentUserRole !== 'driver' &&
                                   (data.status === 'pending_manager_approval' && currentUserRole === 'manager' ||
                                    data.status === 'pending_manager_approval' && isOfficeLeaderActingAsManager ||
                                    data.status === 'pending_dispatch' && currentUserRole === 'office_leader' ||
                                    data.status === 'pending_company_approval' && currentUserRole === 'company_leader');

                const isOfficeLeaderAssigning = currentUserRole === 'office_leader' && data.status === 'pending_dispatch';
                const isOfficeLeaderReassigning = currentUserRole === 'office_leader' && data.status === 'assigned';

                const isDriver = currentUserRole === 'driver' &&
                                data.driverId === currentUserId &&
                                (data.status === 'assigned' || data.status === 'picked_up' || data.status === 'in_progress' || data.status === 'completed_by_driver');

                // Lấy danh sách xe và tài xế cho office leader (đã tích hợp chức năng điều phối)
                let vehicleOptions = '';
                let driverOptions = '';
                const vehiclesData = {}; // Lưu trữ data xe để auto-select tài xế

                if (isOfficeLeaderAssigning || isOfficeLeaderReassigning) {
                    try {
                        // Get all assigned/in-progress requests to check time conflicts
                        const activeRequestsQuery = query(
                            collection(db, REQUESTS_COLLECTION),
                            where("status", "in", ["assigned", "picked_up", "in_progress"])
                        );
                        const activeRequestsSnapshot = await getDocs(activeRequestsQuery);

                        // Load all vehicles
                        const vq = query(collection(db, VEHICLES_COLLECTION));
                        const vSnapshot = await getDocs(vq);

                        if (vSnapshot.empty) {
                            vehicleOptions = '<option value="">Không có xe nào</option>';
                        } else {
                            // Build a map of vehicle -> conflicting time ranges
                            const vehicleConflicts = {};
                            activeRequestsSnapshot.docs.forEach(reqDoc => {
                                const reqData = reqDoc.data();
                                const vehicleId = reqData.vehicleId;
                                if (vehicleId) {
                                    if (!vehicleConflicts[vehicleId]) {
                                        vehicleConflicts[vehicleId] = [];
                                    }
                                    vehicleConflicts[vehicleId].push({
                                        startTime: reqData.startTime.toDate(),
                                        endTime: reqData.endTime.toDate()
                                    });
                                }
                            });

                            // Check if current request time conflicts with any vehicle's assigned trips
                            const currentStartTime = data.startTime.toDate();
                            const currentEndTime = data.endTime.toDate();

                            // Build vehicle list with conflict info for optimization
                            const vehiclesList = [];
                            vSnapshot.docs.forEach(v => {
                                const vehicleId = v.id;
                                const vehicleDataItem = v.data();
                                vehiclesData[vehicleId] = vehicleDataItem;

                                // Check for time conflicts
                                let hasConflict = false;
                                if (vehicleConflicts[vehicleId]) {
                                    hasConflict = vehicleConflicts[vehicleId].some(conflict => {
                                        // Check if time ranges overlap
                                        return (currentStartTime < conflict.endTime && currentEndTime > conflict.startTime);
                                    });
                                }

                                vehiclesList.push({
                                    id: vehicleId,
                                    data: vehicleDataItem,
                                    hasConflict: hasConflict

                                    driverConflicts[driverId].push({
                                        startTime: reqData.startTime.toDate(),

                            // Check if current request time conflicts with any driver's assigned trips

                                    if (driverConflicts[driverId]) {

                                            // Check if time ranges overlap
                                            return (currentStartTime < conflict.endTime && currentEndTime > conflict.startTime);
                                        });
                                    }

                                        return `<option value="${driverId}">${driver.name}</option>`;

                                })

                        console.error('Error loading vehicles/drivers:', error);
                        vehicleOptions = '<option value="">Lỗi tải danh sách xe</option>';

        // Xử lý Phê duyệt (Chung)
        async function handleApproval(requestId, isApproved) {
            const reason = document.getElementById('rejection-reason')?.value || '';
            if (!isApproved && !reason) {
                alert("Vui lòng nhập lý do từ chối."); return;
            }

            const docRef = doc(db, REQUESTS_COLLECTION, requestId);
            const docSnap = await getDoc(docRef);
            const data = docSnap.data();
            const currentStatus = data.status;
            let nextStatus = '';

            // Check if this is Office Leader dispatching (chọn xe + tài xế)
            const isOfficeLeaderAssigning = currentStatus === 'pending_dispatch' && isApproved;

            // Validate vehicle/driver selection for Office Leader (QL Điều xe)
            if (isOfficeLeaderAssigning) {
                const vehicleSelect = document.getElementById('vehicle-select');
                const driverSelect = document.getElementById('driver-id-select');

                if (!vehicleSelect?.value || !driverSelect?.value) {
                    alert("Vui lòng chọn xe và tài xế để hoàn tất điều xe.");
                    return;
                }
            }

            if (isApproved) {
                // Qui trình: NV → LĐ Phòng → QL Điều xe → LĐ PTQLKCN → Tài xế
                if (currentStatus === 'pending_manager_approval') nextStatus = 'pending_dispatch';
                else if (currentStatus === 'pending_dispatch') nextStatus = 'pending_company_approval';
                else if (currentStatus === 'pending_company_approval') nextStatus = 'assigned';
            } else {
                nextStatus = 'rejected';
            }
            
            // Cập nhật lịch sử
            const newHistory = {
                status: nextStatus,
                timestamp: Timestamp.now(),
                actor: currentUserId,
                actorName: currentUserName,
                ...(isApproved ? {} : { reason: reason })
            };
            const updatedHistory = [...data.history, newHistory];

            try {
                const updateData = {
                    status: nextStatus,
                    rejectionReason: isApproved ? null : reason,
                    history: updatedHistory
                };

                // Add approval timestamp based on current status
                if (isApproved) {
                    const approvalTimestamp = Timestamp.now();
                    if (currentStatus === 'pending_manager_approval') {
                        updateData.managerApprovedAt = approvalTimestamp;
                        updateData.managerApprovedBy = currentUserId;
                        updateData.managerApprovedByName = currentUserName;
                    } else if (currentStatus === 'pending_dispatch') {
                        updateData.dispatchedAt = approvalTimestamp;
                        updateData.dispatchedBy = currentUserId;
                        updateData.dispatchedByName = currentUserName;

                        // Add vehicle assignment data for QL Điều xe
                        if (isOfficeLeaderAssigning) {
                            const vehicleSelect = document.getElementById('vehicle-select');
                            const driverSelect = document.getElementById('driver-id-select');
                            const vehicleId = vehicleSelect.value;
                            const driverId = driverSelect.value;

                            // Validate vehicle time conflict
                            const currentStartTime = data.startTime.toDate();
                            const currentEndTime = data.endTime.toDate();

                            const vehicleConflictQuery = query(
                                collection(db, REQUESTS_COLLECTION),
                                where("vehicleId", "==", vehicleId),
                                where("status", "in", ["assigned", "picked_up", "in_progress"])
                            );
                            const vehicleConflictSnapshot = await getDocs(vehicleConflictQuery);

                            let hasVehicleConflict = false;
                            vehicleConflictSnapshot.docs.forEach(conflictDoc => {
                                const conflictData = conflictDoc.data();
                                const conflictStart = conflictData.startTime.toDate();
                                const conflictEnd = conflictData.endTime.toDate();
                                if (currentStartTime < conflictEnd && currentEndTime > conflictStart) {
                                    hasVehicleConflict = true;
                                }
                            });

                            if (hasVehicleConflict) {
                                alert(`Xe này đã được phân công cho chuyến đi khác trong khung thời gian này. Vui lòng chọn xe khác.`);
                                return;
                            }

                            // Validate driver time conflict
                            const driverConflictQuery = query(
                                collection(db, REQUESTS_COLLECTION),
                                where("driverId", "==", driverId),
                                where("status", "in", ["assigned", "picked_up", "in_progress"])
                            );
                            const driverConflictSnapshot = await getDocs(driverConflictQuery);

                            let hasDriverConflict = false;
                            driverConflictSnapshot.docs.forEach(conflictDoc => {
                                const conflictData = conflictDoc.data();
                                const conflictStart = conflictData.startTime.toDate();
                                const conflictEnd = conflictData.endTime.toDate();
                                if (currentStartTime < conflictEnd && currentEndTime > conflictStart) {
                                    hasDriverConflict = true;
                                }
                            });

                            if (hasDriverConflict) {
                                alert(`Tài xế này đã được phân công cho chuyến đi khác trong khung thời gian này. Vui lòng chọn tài xế khác.`);
                                return;
                            }

                            // Get vehicle info from the modal's vehiclesData (we need to pass it)
                            // For now, fetch the vehicle data
                            const vehicleDoc = await getDoc(doc(db, VEHICLES_COLLECTION, vehicleId));
                            const vehicleInfo = vehicleDoc.data();

                            const driverDoc = await getDoc(doc(db, USERS_COLLECTION, driverId));
                            const driverInfo = driverDoc.data();

                            updateData.vehicleId = vehicleId;
                            updateData.driverId = driverId;
                            updateData.vehicleName = vehicleInfo.name;
                            updateData.vehiclePlate = vehicleInfo.plate;
                            updateData.driverName = driverInfo.name;
                            updateData.driverPhone = driverInfo.mobile || driverInfo.phone || '';
                            updateData.assignedAt = approvalTimestamp;
                            updateData.assignedBy = currentUserId;
                            updateData.assignedByName = currentUserName;

        // Xử lý Điều phối xe (Office Leader gán xe khi duyệt cấp 3)
        async function handleAssignment(requestId, vehiclesData) {
            const vehicleSelect = document.getElementById('vehicle-select');
            const driverSelect = document.getElementById('driver-id-select');

            const vehicleId = vehicleSelect.value;
            const driverId = driverSelect.value;

            if (!vehicleId || !driverId) {
                alert("Vui lòng chọn xe và tài xế.");
                return;
            }

            try {
                // Validate vehicle exists
                const vehicleInfo = vehiclesData[vehicleId];
                if (!vehicleInfo) {
                    alert("Không tìm thấy thông tin xe!");
                    return;
                }

                // Validate driver exists
                const driverInfoDoc = await getDoc(doc(db, USERS_COLLECTION, driverId));
                if (!driverInfoDoc.exists()) {
                    alert("Không tìm thấy thông tin tài xế!");
                    return;
                }

                const driverInfo = driverInfoDoc.data();
                if (driverInfo.role !== 'driver') {
                    alert("Người được chọn không phải là tài xế!");
                    return;
                }

                // Get current request data
                const requestDoc = await getDoc(doc(db, REQUESTS_COLLECTION, requestId));
                if (!requestDoc.exists()) {
                    alert("Không tìm thấy yêu cầu!");
                    return;
                }

                const requestData = requestDoc.data();
                if (requestData.status !== 'pending_dispatch') {
                    alert("Yêu cầu này không ở trạng thái chờ điều phối!");
                    return;
                }

                // Validate time conflict - check if vehicle is already assigned during this time
                const currentStartTime = requestData.startTime.toDate();
                const currentEndTime = requestData.endTime.toDate();

                const conflictQuery = query(
                    collection(db, REQUESTS_COLLECTION),
                    where("vehicleId", "==", vehicleId),
                    where("status", "in", ["assigned", "picked_up", "in_progress"])
                );
                const conflictSnapshot = await getDocs(conflictQuery);

                let hasConflict = false;
                conflictSnapshot.docs.forEach(conflictDoc => {
                    const conflictData = conflictDoc.data();
                    const conflictStart = conflictData.startTime.toDate();
                    const conflictEnd = conflictData.endTime.toDate();

                    // Check if time ranges overlap
                    if (currentStartTime < conflictEnd && currentEndTime > conflictStart) {
                        hasConflict = true;
                    }
                });

                if (hasConflict) {
                    alert(`Xe này đã được phân công cho chuyến đi khác trong khung thời gian này. Vui lòng chọn xe khác hoặc điều chỉnh thời gian.`);
                    return;
                }

                // Validate driver time conflict
                const driverConflictQuery = query(
                    collection(db, REQUESTS_COLLECTION),
                    where("driverId", "==", driverId),
                    where("status", "in", ["assigned", "picked_up", "in_progress"])
                );
                const driverConflictSnapshot = await getDocs(driverConflictQuery);

                let hasDriverConflict = false;
                driverConflictSnapshot.docs.forEach(conflictDoc => {
                    const conflictData = conflictDoc.data();
                    const conflictStart = conflictData.startTime.toDate();
                    const conflictEnd = conflictData.endTime.toDate();

                    // Check if time ranges overlap
                    if (currentStartTime < conflictEnd && currentEndTime > conflictStart) {
                        hasDriverConflict = true;
                    }
                });

                if (hasDriverConflict) {
                    alert(`Tài xế này đã được phân công cho chuyến đi khác trong khung thời gian này. Vui lòng chọn tài xế khác hoặc điều chỉnh thời gian.`);
                    return;
                }

                // Prepare history entry
                const currentHistory = requestData.history || [];
                const newHistoryEntry = {
                    status: 'assigned',
                    timestamp: Timestamp.now(),
                    actor: currentUserId,
                    actorName: currentUserName
                };

                // Prepare updates
                const updates = {
                    status: 'assigned',
                    vehicleId: vehicleId,
                    driverId: driverId,
                    vehicleName: vehicleInfo.name,
                    vehiclePlate: vehicleInfo.plate,
                    driverName: driverInfo.name,
                    driverPhone: driverInfo.phone || driverInfo.email || '',
                    assignedAt: Timestamp.now(),
                    assignedBy: currentUserId,
                    assignedByName: currentUserName,
                    history: [...currentHistory, newHistoryEntry]
                };

                // Update request (no vehicle status change)
                await updateDoc(doc(db, REQUESTS_COLLECTION, requestId), updates);

                // === TẠO THÔNG BÁO: Office Leader phân công xe ===
                const startTimeDate = requestData.startTime.toDate();
                const timeStr = startTimeDate.toLocaleTimeString('vi-VN', {hour: '2-digit', minute: '2-digit'});
                const dateStr = startTimeDate.toLocaleDateString('vi-VN');

                // Thông báo cho tài xế (nếu được cấu hình)
                if (await shouldRoleReceiveNotification('driver', NOTIF_TYPES.VEHICLE_ASSIGNED)) {
                    await createNotification({
                        title: '🚗 Bạn được phân công chuyến xe mới',
                        content: `Bạn được phân công lái xe ${vehicleInfo.name} (${vehicleInfo.plate}) đưa ${requestData.requesterName} đi "${requestData.destination}" vào ${dateStr} lúc ${timeStr}.`,
                        type: NOTIF_TYPES.VEHICLE_ASSIGNED,
                        priority: 'high',
                        targetType: 'user',
                        targetIds: [driverId],
                        relatedRequestId: requestId
                    });
                }

                // Thông báo cho người yêu cầu (nếu được cấu hình)
                if (await shouldStaffReceiveNotification(NOTIF_TYPES.VEHICLE_ASSIGNED)) {
                    await createNotification({

                        content: `Yêu cầu xe đi "${requestData.destination}" ngày ${dateStr} đã được phân công. Xe: ${vehicleInfo.name} (${vehicleInfo.plate}), Tài xế: ${driverInfo.name}, SĐT: ${driverInfo.phone || driverInfo.mobile || 'Chưa cập nhật'}.`,
                        type: NOTIF_TYPES.VEHICLE_ASSIGNED,
                        priority: 'high',
                        targetType: 'user',
                        targetIds: [requestData.requesterId],
                        relatedRequestId: requestId
                    });
                }

                // Tạo thông báo nhắc nhở (đã kiểm tra settings bên trong)
                await createTripReminder({
                    ...requestData,
                    driverId: driverId,
                    destination: requestData.destination
                }, requestId);

                alert("Điều phối xe thành công! Tài xế đã được thông báo.");
                closeModal();
            } catch (e) {
                console.error("Lỗi điều phối:", e);
                alert(`Lỗi khi điều phối xe: ${e.message}`);
            }
        }

        // Xử lý Cập nhật Thời gian
        async function handleTimeUpdate(requestId) {
            // Combine day, month, year, hour, and minute inputs
            const startDay = document.getElementById('detail-start-day').value;
            const startMonth = document.getElementById('detail-start-month').value;
            const startYear = document.getElementById('detail-start-year').value;
            const startHour = document.getElementById('detail-start-hour').value;
            const startMinute = document.getElementById('detail-start-minute').value;

            const endDay = document.getElementById('detail-end-day').value;
            const endMonth = document.getElementById('detail-end-month').value;
            const endYear = document.getElementById('detail-end-year').value;
            const endHour = document.getElementById('detail-end-hour').value;
            const endMinute = document.getElementById('detail-end-minute').value;

            if (!startDay || !startMonth || !startYear || !startHour || !startMinute ||
                !endDay || !endMonth || !endYear || !endHour || !endMinute) {
                alert('Vui lòng nhập đầy đủ thời gian bắt đầu và kết thúc!');
                return;
            }

            const startTime = new Date(`${startYear}-${startMonth}-${startDay}T${startHour}:${startMinute}`);
            const endTime = new Date(`${endYear}-${endMonth}-${endDay}T${endHour}:${endMinute}`);

            // Validate times
            const now = new Date();

            // Check if start time is after current time (startTime must be > now)
            if (startTime <= now) {
                alert('Thời gian bắt đầu phải sau thời điểm hiện tại!');
                return;
            }

            // Check if end time is greater than start time
            if (endTime <= startTime) {
                alert('Thời gian kết thúc phải sau thời gian bắt đầu!');
                return;
            }

            try {
                const docRef = doc(db, REQUESTS_COLLECTION, requestId);

                // Update request with new times
                await updateDoc(docRef, {
                    startTime: Timestamp.fromDate(startTime),
                    endTime: Timestamp.fromDate(endTime),
                    updatedAt: Timestamp.now(),
                    updatedBy: currentUserId,
                    updatedByName: currentUserName
                });

                alert('Cập nhật thời gian thành công!');
                closeModal();

                // Reopen the modal to show updated data
                setTimeout(() => showRequestDetails(requestId), 300);
            } catch (error) {
                console.error('Error updating time:', error);
                alert(`Lỗi khi cập nhật thời gian: ${error.message}`);
            }
        }

        // Xử lý Chuyến đi (Driver)
        async function handleTripUpdate(requestId, newStatus) {
            try {
                let updates = { status: newStatus };

                // Lấy dữ liệu hiện tại
                const docSnap = await getDoc(doc(db, REQUESTS_COLLECTION, requestId));
                if (!docSnap.exists()) {
                    alert('Không tìm thấy yêu cầu!');
                    return;
                }
                const data = docSnap.data();

                // Xử lý theo từng trạng thái
                if (newStatus === 'completed' || newStatus === 'completed_by_driver') {
                    const finalKm = document.getElementById('final-km').value.trim();
                    const tripNotes = document.getElementById('trip-notes').value.trim();

                    // Validate: finalKm là bắt buộc
                    if (!finalKm) {
                        alert('Vui lòng nhập số Km cuối!');
                        return;
                    }

                    updates.finalKm = finalKm;
                    updates.tripNotes = tripNotes;
                    updates.completedAt = Timestamp.now();
                }

                // Cập nhật lịch sử
                const currentHistory = data.history || [];
                updates.history = [
                    ...currentHistory,
                    {
                        status: newStatus,
                        timestamp: Timestamp.now(),
                        actor: currentUserId,
                        actorName: currentUserName,
                        ...((newStatus === 'completed' || newStatus === 'completed_by_driver') && {
                            km: updates.finalKm,
                            notes: updates.tripNotes
                        })
                    }
                ];

                // Cập nhật request
                await updateDoc(doc(db, REQUESTS_COLLECTION, requestId), updates);

                // ===== THÔNG BÁO HOÀN THÀNH CHUYẾN =====
                if (newStatus === 'completed' || newStatus === 'completed_by_driver') {
                    // Thông báo cho người yêu cầu (nếu được cấu hình)
                    if (data.requesterId && await shouldStaffReceiveNotification(NOTIF_TYPES.TRIP_COMPLETED)) {
                        await createNotification({
                            title: '✅ Chuyến đi đã hoàn thành',
                            content: `Chuyến đi đến "${data.destination}" đã hoàn thành thành công. Cảm ơn bạn đã sử dụng dịch vụ.`,
                            type: NOTIF_TYPES.TRIP_COMPLETED,
                            priority: 'normal',
                            targetType: 'user',
                            targetIds: [data.requesterId],
                            relatedRequestId: requestId
                        });
                    }
                }

                // Hiển thị thông báo thành công
                if (newStatus === 'in_progress') {
                    alert('✅ Đã đón khách và bắt đầu di chuyển!');
                } else if (newStatus === 'completed' || newStatus === 'completed_by_driver') {
                    alert('✅ Chuyến đi đã hoàn thành!');
                }

                closeModal();
            } catch (e) {
                console.error("Lỗi cập nhật chuyến đi:", e);
                alert(`Lỗi khi cập nhật: ${e.message}`);
            }
        }

        // Approval History Function - shows approved/rejected requests within last 30 days
        // Filtered to show only approvals related to the current user
        async function attachApprovalHistory(role, containerId) {
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            const thirtyDaysAgoTimestamp = Timestamp.fromDate(thirtyDaysAgo);

            let q;
            if (role === 'manager') {
                // Show requests approved by THIS manager only - use single field query to avoid index requirement
                q = query(
                    collection(db, REQUESTS_COLLECTION),
                    where("managerApprovedBy", "==", currentUserId)
                );
            } else if (role === 'company_leader') {
                // Show requests approved by THIS company leader only
                q = query(
                    collection(db, REQUESTS_COLLECTION),
                    where("companyApprovedBy", "==", currentUserId)
                );
            } else if (role === 'office_leader') {
                // Query cả field mới (dispatchedBy) và cũ (officeApprovedBy) rồi merge
                try {
                    const q1 = query(collection(db, REQUESTS_COLLECTION), where("dispatchedBy", "==", currentUserId));
                    const q2 = query(collection(db, REQUESTS_COLLECTION), where("officeApprovedBy", "==", currentUserId));
                    const [snap1, snap2] = await Promise.all([getDocs(q1), getDocs(q2)]);
                    const mergedMap = new Map();
                    snap1.docs.forEach(d => mergedMap.set(d.id, d));
                    snap2.docs.forEach(d => { if (!mergedMap.has(d.id)) mergedMap.set(d.id, d); });
                    // Dùng dispatchedBy query làm realtime listener cho lần sau
                    q = q1;
                } catch(e) {
                    console.error('Error loading office_leader history:', e);
                    q = query(collection(db, REQUESTS_COLLECTION), where("dispatchedBy", "==", currentUserId));
                }
            } else if (role === 'requester') {
                // Show requests created by THIS requester only
                q = query(
                    collection(db, REQUESTS_COLLECTION),
                    where("requesterId", "==", currentUserId),
                    where("createdAt", ">=", thirtyDaysAgoTimestamp),
                    orderBy("createdAt", "desc")
                );
            }

            addManagedListener(q, (snapshot) => {
                const container = document.getElementById(containerId);
                if (!container) return;

                // Client-side filtering for 30-day limit and sorting
                let filteredDocs = snapshot.docs;

                if (role === 'manager') {
                    filteredDocs = snapshot.docs.filter(doc => {
                        const data = doc.data();
                        return data.managerApprovedAt && data.managerApprovedAt.toMillis() >= thirtyDaysAgoTimestamp.toMillis();
                    }).sort((a, b) => {
                        const aTime = a.data().managerApprovedAt?.toMillis() || 0;
                        const bTime = b.data().managerApprovedAt?.toMillis() || 0;
                        return bTime - aTime;
                    });
                } else if (role === 'company_leader') {
                    filteredDocs = snapshot.docs.filter(doc => {
                        const data = doc.data();
                        return data.companyApprovedAt && data.companyApprovedAt.toMillis() >= thirtyDaysAgoTimestamp.toMillis();
                    }).sort((a, b) => {
                        const aTime = a.data().companyApprovedAt?.toMillis() || 0;
                        const bTime = b.data().companyApprovedAt?.toMillis() || 0;
                        return bTime - aTime;
                    });
                } else if (role === 'office_leader') {
                    filteredDocs = snapshot.docs.filter(doc => {
                        const data = doc.data();
                        const dispatchTime = data.dispatchedAt || data.officeApprovedAt;
                        return dispatchTime && dispatchTime.toMillis() >= thirtyDaysAgoTimestamp.toMillis();
                    }).sort((a, b) => {
                        const aTime = (a.data().dispatchedAt || a.data().officeApprovedAt)?.toMillis() || 0;
                        const bTime = (b.data().dispatchedAt || b.data().officeApprovedAt)?.toMillis() || 0;
                        return bTime - aTime;
                    });
                }
                // For requester, already sorted by server-side query

                if (filteredDocs.length === 0) {
                    container.innerHTML = "<p class='text-gray-500'>Không có lịch sử yêu cầu của bạn trong 30 ngày qua.</p>";
                    return;
                }

                // Render both table (desktop) and cards (mobile)
                container.innerHTML = `
                    <!-- Desktop Table -->
                    <div class="history-table-container overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase whitespace-nowrap">Thời gian</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase whitespace-nowrap">Người yêu cầu</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase whitespace-nowrap">Đơn vị</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase whitespace-nowrap">Số lượng</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase whitespace-nowrap">Mục đích</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase whitespace-nowrap">Lộ trình</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase whitespace-nowrap">Trạng thái</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase whitespace-nowrap">Hành động</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200">
                                ${filteredDocs.map(doc => renderHistoryRow(doc.data(), doc.id, role)).join('')}
                            </tbody>
                        </table>
                    </div>
                    <!-- Mobile Cards -->
                    <div class="history-cards-container">
                        ${filteredDocs.map(doc => renderHistoryCard(doc.data(), doc.id, role)).join('')}
                    </div>
                `;

                filteredDocs.forEach(doc => {
                    const viewBtn = document.getElementById(`view-history-${doc.id}`);
                    const cardBtn = document.getElementById(`history-card-view-${doc.id}`);
                    if (viewBtn) viewBtn.addEventListener('click', () => showRequestDetails(doc.id));
                    if (cardBtn) cardBtn.addEventListener('click', () => showRequestDetails(doc.id));
                });
            }, (error) => {
                console.error("Lỗi lắng nghe lịch sử:", error);
                const container = document.getElementById(containerId);
                if (container) {
                    container.innerHTML = "<p class='text-red-500'>Không thể tải lịch sử.</p>";
                }
            });
        }
