<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#009245">
  <title>RRIV ERP — Không có mạng</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      text-align: center;
    }
    .card {
      max-width: 400px;
      background: #1e293b;
      border-radius: 20px;
      padding: 32px 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,.35);
    }
    img { width: 72px; height: 72px; object-fit: contain; background: #fff; border-radius: 12px; padding: 6px; }
    h1 { font-size: 1.25rem; margin: 16px 0 8px; color: #fff; }
    p { font-size: 0.95rem; line-height: 1.5; color: #94a3b8; margin-bottom: 20px; }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #009245;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #007a3a; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/static/logo.png" alt="RRIV">
    <h1>Không có kết nối mạng</h1>
    <p>Bạn đang offline. Kiểm tra Wi‑Fi hoặc dữ liệu di động, sau đó thử lại. Một số tính năng (ví dụ Sản lượng CN) vẫn dùng được nếu đã mở trước đó.</p>
    <button type="button" onclick="location.reload()">Thử lại</button>
  </div>
</body>
</html>
