services:
  - type: web
    name: rriv-erp
    runtime: python
    plan: free
    healthCheckPath: /
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: FLASK_DEBUG
        value: "0"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: EMAIL_SENDER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: MAPBOX_TOKEN
        sync: false
      - key: VOICERSS_API_KEY
        sync: false
      - key: MEETING_DOCS_BUCKET
        value: meeting-docs
      - key: PUBLIC_BASE_URL
        sync: false
      - key: FIREBASE_DATABASE_URL
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
